  const session = {
    id: newSessionId(),
    completed_at: new Date().toISOString(),

    skin_name: getCurrentSkin().name,
    firstName: USER.firstName,
    lastName: USER.lastName,

    secondary_pattern: secondaryKey,

    overall: R.overall,
    levels: R.levels,
    practices: R.practices,
    risks: R.risks,
    reflections: { ...STATE.reflections },
    cloudSynced: false
  };
  const hist = loadHistory();
  hist.push(session);
  try { localStorage.setItem(ADMIN_LS_HISTORY, JSON.stringify(hist)); } catch (e) {}

  // Fire-and-forget cloud submission. Failure is non-fatal, the session is
  // already safe in localStorage and can be re-synced from the admin Results
  // tab via "Retry failed uploads".
  submitSessionToCloud(session).then(ok => {
    if (ok) markSessionSynced(session.id);
  });
  // Fire-and-forget user (+admin) result email. Silent on failure: the
  // results page works regardless and the user can still download the PDF
  // manually. The email function is a no-op until RESEND_API_KEY + EMAIL_FROM
  // are configured on the site.
  autoEmailResult(session);
}

// CLOUD SYNC, centralised results via Netlify Functions + Blobs

const CLOUD_TOKEN_LS_KEY = 'mandarin.assessment.cloudToken';

function newSessionId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 's-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
}

function submitSessionToCloud(session) {
  return fetch('/api/sessions/submit', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(session)
  }).then(r => r.ok).catch(() => false);
}

function markSessionSynced(id) {
  const hist = loadHistory();
  const target = hist.find(s => s && s.id === id);
  if (target && !target.cloudSynced) {
    target.cloudSynced = true;
    try { localStorage.setItem(ADMIN_LS_HISTORY, JSON.stringify(hist)); } catch (e) {}
  }
}

function getCloudToken() {
  try { return localStorage.getItem(CLOUD_TOKEN_LS_KEY) || ''; } catch (e) { return ''; }
}

function saveCloudToken(token) {
  try {
    if (token) localStorage.setItem(CLOUD_TOKEN_LS_KEY, token);
    else localStorage.removeItem(CLOUD_TOKEN_LS_KEY);
  } catch (e) {}
}

function adminAuthHeaders() {
  const t = getCloudToken();
  return t ? { 'authorization': 'Bearer ' + t } : {};
}

function fetchCloudSessions() {
  return fetch('/api/sessions/list', { headers: adminAuthHeaders() })
    .then(r => r.json().then(body => ({ ok: r.ok, status: r.status, body })));
}

function deleteCloudSession(id) {
  return fetch('/api/sessions/delete?id=' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: adminAuthHeaders()
  }).then(r => r.json().then(body => ({ ok: r.ok, status: r.status, body })));
}

async function retryUnsyncedSessions() {
  const hist = loadHistory();
  const unsynced = hist.filter(s => s && !s.cloudSynced);
  let synced = 0, failed = 0;
  for (const s of unsynced) {
    if (!s.id) { s.id = newSessionId(); }
    const ok = await submitSessionToCloud(s);
    if (ok) { s.cloudSynced = true; synced++; }
    else { failed++; }
  }
  try { localStorage.setItem(ADMIN_LS_HISTORY, JSON.stringify(hist)); } catch (e) {}
  return { attempted: unsynced.length, synced, failed };
}

function adminSaveCloudToken() {
  const el = document.getElementById('adminCloudToken');
  if (!el) return;
  saveCloudToken(el.value.trim());
  setCloudStatus(el.value.trim() ? 'Token saved.' : 'Token cleared.');
}

function setCloudStatus(msg, color) {
  const el = document.getElementById('adminCloudStatus');
  if (el) {
    el.textContent = msg;
    el.style.color = color || 'var(--ink-mute)';
  }
}

async function adminFetchCloud() {
  const tokenEl = document.getElementById('adminCloudToken');
  if (tokenEl && tokenEl.value.trim() && tokenEl.value.trim() !== getCloudToken()) {
    saveCloudToken(tokenEl.value.trim());
  }
  setCloudStatus('Fetching…');
  let res;
  try {
    res = await fetchCloudSessions();
  } catch (e) {
    setCloudStatus('Network error: ' + e.message, 'var(--amber-bright)');
    return;
  }
  if (!res.ok) {
    setCloudStatus('Failed (' + res.status + '): ' + ((res.body && res.body.error) || 'unknown error'), 'var(--amber-bright)');
    return;
  }
  const sessions = (res.body && res.body.sessions) || [];
  setCloudStatus(`Loaded ${sessions.length} cloud session${sessions.length===1?'':'s'}.`);
  renderCloudSessions(sessions);
}

  // so per-row handlers (delete, magic-link) can refuse to act on it.
  const display = [buildDemoSession()].concat(sessions || []);

      <td class="arch-cell">${escapeHTML(s.archetype_name || s.archetype || '')}${s.secondary_name ? `<br><span style="font-size:11px;color:#ff481d">+ ${s.secondary_name}</span>` : ''}</td>

function viewCloudSession(i) {
  const s = (window.__adminCloudCache || [])[i];
  if (!s) return;
  renderSessionResults(s, { returnTo: 'admin', label: `${s.firstName || ''} ${s.lastName || ''}`.trim() + (s._demo ? ' · DEMO' : ' · cloud') });
}

async function adminDeleteCloudSession(i) {
  const cache = window.__adminCloudCache || [];
  const s = cache[i];
  if (!s || !s.id) return;
  if (!confirm(`Delete cloud session for ${s.firstName || ''} ${s.lastName || ''} (${new Date(s.completed_at).toLocaleString()})? This cannot be undone.`)) return;
  setCloudStatus('Deleting…');
  const res = await deleteCloudSession(s.id);
  if (res.ok) {
    cache.splice(i, 1);
    renderCloudSessions(cache);
    setCloudStatus('Deleted.');
  } else {
    setCloudStatus('Delete failed (' + res.status + '): ' + ((res.body && res.body.error) || ''), 'var(--amber-bright)');
  }
}

async function adminLoadRecipients() {
  const tokenSet = !!getCloudToken();
  if (!tokenSet) {
    setRecipientsStatus('Paste your admin token below first, then reload.');
    return;
  }
  try {
    const r = await fetch('/api/admin/config/emails', { headers: adminAuthHeaders() });
    const j = await r.json();
    if (!r.ok) { setRecipientsStatus('Failed (' + r.status + '): ' + (j.error || ''), 'var(--amber-bright)'); return; }
    const list = j.recipients || [];
    const input = document.getElementById('adminRecipientsInput');
    if (input) input.value = list.join(', ');
    setRecipientsStatus(list.length === 0 ? 'No recipients configured yet.' : `${list.length} recipient${list.length===1?'':'s'} on file.${j.updated_at ? ' Updated ' + new Date(j.updated_at).toLocaleString() + '.' : ''}`);
  } catch (e) {
    setRecipientsStatus('Network error: ' + e.message, 'var(--amber-bright)');
  }
}

function setRecipientsStatus(msg, color) {
  const el = document.getElementById('adminRecipientsStatus');
  if (el) { el.textContent = msg; el.style.color = color || 'var(--ink-mute)'; }
}

async function adminSaveRecipients() {
  const input = document.getElementById('adminRecipientsInput');
  if (!input) return;
  const recipients = input.value.split(/[,\n]+/).map(s => s.trim()).filter(Boolean);
  setRecipientsStatus('Saving…');
  try {
    const r = await fetch('/api/admin/config/emails', {
      method: 'POST',
      headers: { 'content-type': 'application/json', ...adminAuthHeaders() },
      body: JSON.stringify({ recipients })
    });
    const j = await r.json();
    if (!r.ok) { setRecipientsStatus('Failed (' + r.status + '): ' + (j.error || ''), 'var(--amber-bright)'); return; }
    setRecipientsStatus(`${j.recipients.length} recipient${j.recipients.length===1?'':'s'} saved.`);
  } catch (e) {
    setRecipientsStatus('Network error: ' + e.message, 'var(--amber-bright)');
  }
}

async function adminCopyMagicLink(email) {
  if (!email) { setCloudStatus('No email on this session.', 'var(--amber-bright)'); return; }
  setCloudStatus('Minting magic link for ' + email + '…');
  let res;
  try {
    const r = await fetch('/api/magic-link/issue', {
      method: 'POST',
      headers: { 'content-type': 'application/json', ...adminAuthHeaders() },
      body: JSON.stringify({ email, ttlDays: 30 })
    });
    res = { ok: r.ok, status: r.status, body: await r.json().catch(() => ({})) };
  } catch (e) {
    setCloudStatus('Network error: ' + e.message, 'var(--amber-bright)');
    return;
  }
  if (!res.ok) {
    setCloudStatus('Failed (' + res.status + '): ' + (res.body.error || 'unknown error'), 'var(--amber-bright)');
    return;
  }
  const url = window.location.origin + '/me?token=' + encodeURIComponent(res.body.token);
  try {
    await navigator.clipboard.writeText(url);
    setCloudStatus('Magic link for ' + email + ' copied to clipboard. Expires ' + new Date(res.body.expires_at).toLocaleDateString() + '.');
  } catch (e) {
    // Fallback: show the URL so admin can copy it manually.
    prompt('Magic link (clipboard blocked, copy manually):', url);
    setCloudStatus('Magic link issued. Clipboard blocked, see prompt.');
  }
}

async function adminRetryUnsynced() {
  setCloudStatus('Retrying…');
  const r = await retryUnsyncedSessions();
  setCloudStatus(`Retry complete: ${r.synced} synced, ${r.failed} still failing.`,
                 r.failed > 0 ? 'var(--amber-bright)' : 'var(--ink-mute)');
  switchAdminTab('results');
}

function exportCloudJSON() {
  const sessions = window.__adminCloudCache || [];
  const blob = new Blob([JSON.stringify(sessions, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cloud-history.json'; a.click();
  URL.revokeObjectURL(url);
}

function exportCloudCSV() {
  const sessions = window.__adminCloudCache || [];
  if (!sessions.length) return;
  const rows = [];
  const headers = ['id','completed_at','skin','firstName','lastName','email','gender','archetype','secondary_pattern','overall','L1','L2','L3','L4',
    ...Object.keys(FRAMEWORK.practices),
    'control_bias','moral_drift','detachment_pressure',
    'reflect_midpoint_thinking','reflect_midpoint_feeling','reflect_midpoint_behaving','reflect_strengths','reflect_beliefs','reflect_mindset','reflect_behaviour'];
  rows.push(headers.join(','));
  sessions.forEach(s => {
    const r = [];
    r.push(csvEscape(s.id || ''));
    r.push(s.completed_at || '');
    r.push(csvEscape(s.skin_name || s.skin || 'force_trial'));
    r.push(csvEscape(s.firstName || '')); r.push(csvEscape(s.lastName || ''));
    r.push(csvEscape(s.email || '')); r.push(csvEscape(s.gender || ''));
    r.push(csvEscape(s.archetype_name || s.archetype || ''));
    r.push(csvEscape(s.secondary_name || ''));
    r.push(s.overall != null ? s.overall : '');
    const lv = s.levels || {};
    r.push(lv.L1 != null ? lv.L1 : ''); r.push(lv.L2 != null ? lv.L2 : ''); r.push(lv.L3 != null ? lv.L3 : ''); r.push(lv.L4 != null ? lv.L4 : '');
    Object.keys(FRAMEWORK.practices).forEach(k => r.push((s.practices || {})[k] != null ? s.practices[k] : ''));
    const risks = s.risks || {};
    r.push(risks.control_bias != null ? risks.control_bias : '');
    r.push(risks.moral_drift != null ? risks.moral_drift : '');
    r.push(risks.detachment_pressure != null ? risks.detachment_pressure : '');
    ['reflect_midpoint_thinking','reflect_midpoint_feeling','reflect_midpoint_behaving','reflect_strengths','reflect_beliefs','reflect_mindset','reflect_behaviour'].forEach(k => r.push(csvEscape((s.reflections || {})[k] || '')));
    rows.push(r.join(','));
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cloud-history.csv'; a.click();
  URL.revokeObjectURL(url);
}

function renderAdminScoring() {
  const edits = loadEdits();
  const questions = SCENES.map((s, i) => ({ s, i })).filter(x => x.s.type === 'question');

  const blocks = questions.map(({ s, i }) => {
    const tag = `${s.locationLabel || ''} · ${s.practice || ''} · ${s.kind}`;
    let rows = '';
    if (s.kind === 'rating') {
      // scoring is an array of 5 objects keyed by practice/risk names
      rows = s.scoring.map((scoreObj, idx) => {
        const cells = Object.entries(scoreObj).map(([k, v]) => `
          <label class="score-cell">
            <span class="key">${k}</span>
            <input type="number" step="1" data-path="scenes.${i}.scoring.${idx}.${k}" value="${v}" oninput="markScoringEdited(this)" onblur="saveScoringField(this)"/>
          </label>
        `).join('');
        return `
          <div class="score-row">
            <div class="score-label"><span class="score-num">${idx + 1}</span><span class="score-text">${escapeHTML(s.labels?.[idx] || '')}</span></div>
            <div class="score-cells">${cells}</div>
          </div>`;
      }).join('');
    } else if (s.kind === 'mc') {
      rows = s.options.map((opt, idx) => {
        const letter = ['A','B','C','D','E','F'][idx];
        const cells = Object.entries(opt.score).map(([k, v]) => `
          <label class="score-cell">
            <span class="key">${k}</span>
            <input type="number" step="1" data-path="scenes.${i}.options.${idx}.score.${k}" value="${v}" oninput="markScoringEdited(this)" onblur="saveScoringField(this)"/>
          </label>
        `).join('');
        return `
          <div class="score-row">
            <div class="score-label"><span class="score-num">${letter}</span><span class="score-text">${escapeHTML(opt.copy)}</span></div>
            <div class="score-cells">${cells}</div>
          </div>`;
      }).join('');
    } else if (s.kind === 'ranking') {
      // items have score objects; also has weights array
      const itemRows = s.items.map((it, idx) => {
        const cells = Object.entries(it.score).map(([k, v]) => `
          <label class="score-cell">
            <span class="key">${k}</span>
            <input type="number" step="1" data-path="scenes.${i}.items.${idx}.score.${k}" value="${v}" oninput="markScoringEdited(this)" onblur="saveScoringField(this)"/>
          </label>
        `).join('');
        return `
          <div class="score-row">
            <div class="score-label"><span class="score-num">${idx + 1}</span><span class="score-text">${escapeHTML(it.label)}</span></div>
            <div class="score-cells">${cells}</div>
          </div>`;
      }).join('');
      const weightRow = s.weights ? `
        <div class="score-row" style="border-top:1px dashed rgba(255,255,255,0.08);padding-top:10px;margin-top:6px">
          <div class="score-label"><span class="score-num">·</span><span class="score-text" style="font-style:italic;color:var(--ink-mute)">Position weights (1st → 4th)</span></div>
          <div class="score-cells">${s.weights.map((w, idx) => `
            <label class="score-cell">
              <span class="key">${['1st','2nd','3rd','4th'][idx]}</span>
              <input type="number" step="0.05" data-path="scenes.${i}.weights.${idx}" value="${w}" oninput="markScoringEdited(this)" onblur="saveScoringField(this)"/>
            </label>
          `).join('')}</div>
        </div>` : '';
      rows = itemRows + weightRow;
    } else if (s.kind === 'short-text') {
      rows = `<div class="score-row"><div class="score-label" style="color:var(--ink-mute);font-style:italic">Free-text · not auto-scored. Edit the question prompt and hint under the Content tab.</div></div>`;
    }

    return `
      <div class="scoring-block">
        <div class="scoring-head">
          <div class="scoring-tag">${escapeHTML(tag)}</div>
          <div class="scoring-prompt">${escapeHTML(s.prompt || '')}</div>
        </div>

      </div>`;
  }).join('');

  const overrideCount = Object.keys(edits).filter(k => /(\.scoring\.|\.options\.\d+\.score\.|\.items\.\d+\.score\.|\.weights\.)/.test(k)).length;

  return `

    <div class="admin-content-search">
      <input id="adminScoringSearch" type="text" placeholder="Filter by practice (e.g. listen_deeply) or question label (e.g. Q05)" oninput="filterScoring(this.value)"/>
    </div>

    ${blocks}
  `;
}

function saveScoringField(el) {

// ────────────────────────────────────────────
// ADMIN, OPENING-SCENE PACING EDITOR
// ────────────────────────────────────────────
// Lets the operator tune the timing of each skin's opening crawl/prologue,
// scene duration plus the per-element delays inside the crawl. Changes
// persist to localStorage and apply on every re-render of the active skin.
function renderAdminPacing() {
  const overrides = loadPacingOverrides();
  let activeSkinAffected = false;
  const blocks = Object.entries(SKINS).map(([skinId, skin]) => {
    const sceneList = (skin && Array.isArray(skin.scenes)) ? skin.scenes : [];
    const crawlScenes = [];
    sceneList.forEach((s, i) => { if (s && s.type === 'crawl') crawlScenes.push({ s, i }); });
    if (!crawlScenes.length) return '';
    const isActive = STATE.currentSkin === skinId;
    if (isActive) activeSkinAffected = true;
    const themeAccent = skin.theme && skin.theme['--amber'] ? skin.theme['--amber'] : 'var(--amber)';

    const sceneBlocks = crawlScenes.map(({ s, i }) => {
      const style = s.crawlStyle || 'film';
      const defaults = PACING_DEFAULTS[style] || {};
      const o = (overrides[skinId] && overrides[skinId][i]) || {};
      const has = (k) => Object.prototype.hasOwnProperty.call(o, k);
      const liveOrDefault = (k) => has(k) ? o[k] : (typeof s[k] === 'number' ? s[k] : defaults[k]);
      const styleLabel = ({ film: 'Film crawl', briefing: 'Briefing cards', scroll: 'Memorial scroll', broadsheet: 'Broadsheet columns' })[style] || style;

      const tunables = [];
      tunables.push({ key: 'duration', label: 'Scene total', defaultMs: s.duration || 0, help: 'Wall-clock length of the scene, when it auto-advances to the next.' });
      if (style === 'film') {
        tunables.push({ key: 'preambleDelay',    label: 'Preamble: appear at',  defaultMs: defaults.preambleDelay,    help: 'When the "A long time ago..." preamble fades in.' });
        tunables.push({ key: 'titleDelay',       label: 'Title: appear at',     defaultMs: defaults.titleDelay,       help: 'When the title slate begins its receding-into-distance flight.' });
        tunables.push({ key: 'scrollStartDelay', label: 'Scroll: start delay',  defaultMs: defaults.scrollStartDelay, help: 'When the receding-text scroll begins. Lower = scroll starts sooner.' });
        tunables.push({ key: 'scrollDuration',   label: 'Scroll: total length', defaultMs: defaults.scrollDuration,   help: 'How long the scroll takes to fully pass through.' });
      } else if (style === 'briefing') {
        tunables.push({ key: 'preambleDelay',  label: 'Preamble: appear at',    defaultMs: defaults.preambleDelay,  help: 'When the channel-open preamble fades in.' });
        tunables.push({ key: 'titleDelay',     label: 'Title: appear at',       defaultMs: defaults.titleDelay,     help: 'When the central title slate flashes in.' });
        tunables.push({ key: 'bodyStartDelay', label: 'Body: first item delay', defaultMs: defaults.bodyStartDelay, help: 'Delay before the first paragraph or card appears.' });
        tunables.push({ key: 'bodyStagger',    label: 'Body: per-item gap',     defaultMs: defaults.bodyStagger,    help: 'Gap between consecutive paragraphs or cards.' });
      } else if (style === 'scroll') {
        tunables.push({ key: 'preambleDelay',  label: 'Preamble: appear at',    defaultMs: defaults.preambleDelay,  help: 'When the royal-dispatch preamble fades in.' });
        tunables.push({ key: 'frameDelay',     label: 'Scroll: unfurl at',      defaultMs: defaults.frameDelay,     help: 'When the seal + title scroll slides into view.' });
        tunables.push({ key: 'bodyStartDelay', label: 'Body: first item delay', defaultMs: defaults.bodyStartDelay, help: 'Delay before the first verse appears.' });
        tunables.push({ key: 'bodyStagger',    label: 'Body: per-item gap',     defaultMs: defaults.bodyStagger,    help: 'Gap between consecutive verses.' });
      } else if (style === 'broadsheet') {
        tunables.push({ key: 'frameDelay',     label: 'Masthead: appear at',    defaultMs: defaults.frameDelay,     help: 'When the broadsheet masthead and title appear.' });
        tunables.push({ key: 'bodyStartDelay', label: 'Body: first item delay', defaultMs: defaults.bodyStartDelay, help: 'Delay before the first leader column appears.' });
        tunables.push({ key: 'bodyStagger',    label: 'Body: per-item gap',     defaultMs: defaults.bodyStagger,    help: 'Gap between consecutive leader columns.' });
      }

      const fieldRows = tunables.map(t => {
        const liveMs = (typeof o[t.key] === 'number') ? o[t.key] : (typeof s[t.key] === 'number' ? s[t.key] : t.defaultMs);
        const valSec = (liveMs / 1000).toFixed(1);
        const overridden = has(t.key);
        return `
          <div class="pacing-field">
            <div class="pacing-field-head">
              <span class="pacing-field-label">${t.label}</span>
              ${overridden ? `<span class="pacing-field-tag" style="color:${themeAccent}">CUSTOM</span>` : ''}
            </div>
            <div class="pacing-field-input">
              <input type="number" step="0.1" min="0" value="${valSec}"
                     data-skin="${skinId}" data-scene="${i}" data-field="${t.key}"
                     oninput="markPacingEdited(this)" onblur="savePacingField(this)"/>
              <span class="pacing-field-unit">sec</span>
            </div>
            <div class="pacing-field-help">${escapeHTML(t.help)}</div>
          </div>`;
      }).join('');

      const hasAnyOverride = Object.keys(o).length > 0;

      return `
        <div class="pacing-scene-block">
          <div class="pacing-scene-head">
            <div class="pacing-scene-style" style="color:${themeAccent}">${styleLabel}</div>
            <div class="pacing-scene-loc">${escapeHTML(s.locationLabel || s.locationName || ('Scene ' + i))}</div>
            ${hasAnyOverride ? `<button class="admin-btn ghost" style="padding:6px 10px;font-size:9px" onclick="resetPacingSceneFromAdmin('${skinId}', ${i})">Reset scene</button>` : ''}
          </div>
          <div class="pacing-field-grid">${fieldRows}</div>
        </div>`;
    }).join('');

    return `
      <div class="pacing-skin-block">
        <div class="pacing-skin-head">
          <div class="pacing-skin-name" style="color:${themeAccent}">${escapeHTML(skin.name)}</div>
          ${isActive ? '<div class="pacing-skin-active">ACTIVE</div>' : ''}
        </div>
        ${sceneBlocks}
      </div>`;
  }).join('');

  return `
    <div class="admin-section-title">Opening scene pacing</div>
    <div class="admin-section-sub">
      Tune the per-element timing of each skin's opening prologue / crawl. Values are in seconds.
      Changes save automatically when you tab or click out of a field, and take effect on the next scene render.<br>
      <em style="color:var(--ink-mute)">Each crawl style exposes its scene total, the keyframe entrance delays (preamble / title or frame), and either the scroll timing (film) or body item delay + per-item gap (briefing / scroll / broadsheet).</em>
    </div>
    <div class="admin-buttons">
      <button class="admin-btn ghost" onclick="exportPacingOverrides()">Export overrides (JSON)</button>
      <button class="admin-btn danger" onclick="resetAllPacing()">Reset all pacing to default</button>
    </div>
    <div id="adminPacingStatus" style="font-family:var(--sans);font-size:11px;color:var(--amber);min-height:14px;letter-spacing:0.02em;margin-bottom:18px"></div>
    ${blocks || '<div class="admin-empty">No crawl/prologue scenes in any skin.</div>'}
  `;
}

function markPacingEdited(el) { el.classList.add('edited'); }

function savePacingField(el) {
  const skinId   = el.dataset.skin;
  const sceneIdx = Number(el.dataset.scene);
  const field    = el.dataset.field;
  const sec      = Number(el.value);
  if (Number.isNaN(sec) || sec < 0) { el.classList.add('err'); return; }
  el.classList.remove('err');

  // Compare against the skin's original value so we don't store no-op overrides.
  const skin = SKINS[skinId];
  const origScene = (skin && Array.isArray(skin.scenes) && skin.scenes[sceneIdx]) ? skin.scenes[sceneIdx] : null;
  const styleKey = (origScene && origScene.crawlStyle) || 'film';
  const origVal = (origScene && typeof origScene[field] === 'number')
    ? origScene[field]
    : (PACING_DEFAULTS[styleKey] && PACING_DEFAULTS[styleKey][field]);
  const ms = Math.round(sec * 1000);
  setPacingOverride(skinId, sceneIdx, field, (ms === origVal) ? null : ms);

  el.classList.remove('edited');
  el.classList.add('saved');
  setTimeout(() => el.classList.remove('saved'), 700);
  setPacingStatus(skinId === STATE.currentSkin ? 'Saved. Active skin updated.' : 'Saved.');
}

function setPacingStatus(msg) {
  const el = document.getElementById('adminPacingStatus');
  if (el) el.textContent = msg;
}

function resetPacingSceneFromAdmin(skinId, sceneIdx) {
  resetPacingForScene(skinId, sceneIdx);
  switchAdminTab('pacing');
  setPacingStatus('Scene reset to defaults.');
}

function resetAllPacing() {
  if (!confirm('Reset every pacing override across every skin? This cannot be undone.')) return;
  persistPacingOverrides({});
  // Reapply (= clear overrides) on the active skin in place.
  if (STATE.currentSkin) {
    const skin = SKINS[STATE.currentSkin];
    if (skin && Array.isArray(skin.scenes)) {
      for (let i = 0; i < SCENES.length; i++) {
        const orig = skin.scenes[i];
        if (!orig || orig.type !== 'crawl') continue;
        const live = SCENES[i];
        const style = orig.crawlStyle || 'film';
        (PACING_ALL_FIELDS[style] || []).forEach(k => {
          if (typeof orig[k] === 'number') live[k] = orig[k];
          else delete live[k];
        });
      }
    }
  }
  switchAdminTab('pacing');
  setPacingStatus('All pacing reset to defaults.');
}

function exportPacingOverrides() {
  const blob = new Blob([JSON.stringify(loadPacingOverrides(), null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'pacing-overrides.json'; a.click();
  URL.revokeObjectURL(url);
}

function exportResultsCSV() {
  const hist = loadHistory();
  if (!hist.length) return;
  const rows = [];
  const headers = ['completed_at','skin','firstName','lastName','email','gender','archetype','secondary_pattern','overall','L1','L2','L3','L4',
    ...Object.keys(FRAMEWORK.practices),
    'control_bias','moral_drift','detachment_pressure',
    'reflect_midpoint_thinking','reflect_midpoint_feeling','reflect_midpoint_behaving','reflect_strengths','reflect_beliefs','reflect_mindset','reflect_behaviour'];
  rows.push(headers.join(','));
  hist.forEach(s => {
    const r = [];
    r.push(s.completed_at);
    r.push(csvEscape(s.skin_name || s.skin || 'force_trial'));
    r.push(csvEscape(s.firstName)); r.push(csvEscape(s.lastName));
    r.push(csvEscape(s.email)); r.push(csvEscape(s.gender||''));
    r.push(csvEscape(s.archetype_name || s.archetype));
    r.push(csvEscape(s.secondary_name || ''));
    r.push(s.overall);
    r.push(s.levels.L1); r.push(s.levels.L2); r.push(s.levels.L3); r.push(s.levels.L4);
    Object.keys(FRAMEWORK.practices).forEach(k => r.push(s.practices[k] || ''));
    r.push(s.risks.control_bias); r.push(s.risks.moral_drift); r.push(s.risks.detachment_pressure);
    ['reflect_midpoint_thinking','reflect_midpoint_feeling','reflect_midpoint_behaving','reflect_strengths','reflect_beliefs','reflect_mindset','reflect_behaviour'].forEach(k => r.push(csvEscape((s.reflections || {})[k] || '')));
    rows.push(r.join(','));
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'assessment-history.csv'; a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

// ?view-session=<id>&token=<magic-link-token>
// Fetch the user's own session via the token-gated read endpoint and render
// the cinematic results page from it. Skip the normal probeAllImages + render
// path; we don't want the assessment chrome appearing at all.
(function() {
  try {
    var qs = new URLSearchParams(window.location.search);
    var sid = qs.get('view-session');
    var tok = qs.get('token');
    if (!sid || !tok) return;
    fetch('/api/user/session?token=' + encodeURIComponent(tok) + '&id=' + encodeURIComponent(sid))
      .then(r => r.json())
      .then(j => {
        if (!j || !j.session) throw new Error(j && j.error ? j.error : 'Session not found');
        const back = '/me?token=' + encodeURIComponent(tok);
        renderSessionResults(j.session, { returnTo: back, label: (j.session.firstName || 'Your') + ' result' });
      })
      .catch(e => {
        document.documentElement.classList.remove('admin-mode');
        document.body.innerHTML = '<div style="font-family:Inter,sans-serif;padding:60px;color:#0a0a0a;background:#f4f0e8;min-height:100vh"><h1 style="font-weight:900;text-transform:uppercase;letter-spacing:-0.01em">Could not load that result</h1><p style="margin-top:14px;font-size:15px;color:#555048">' + escapeHTML(e.message || 'Unknown error') + '. <a style="color:#ff481d;text-decoration:underline" href="/me?token=' + encodeURIComponent(tok) + '">Back to your results</a> or <a style="color:#ff481d;text-decoration:underline" href="/">return to the landing page</a>.</p></div>';
      });
  } catch (e) {}
})();

// Probe images first so any present PNGs are detected before first render.
// Skip if we're showing a stored-session view; renderSessionResults handles
// it directly and we don't want a brief flash of the cinematic landing.
(function() {
  var qs = new URLSearchParams(window.location.search);
  if (qs.has('view-session')) return;
  probeAllImages().finally(() => {
    renderCurrent();
  });
})();

</script>
</body>
</html>
