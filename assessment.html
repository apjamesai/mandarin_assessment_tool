}
.admin-panel input:focus, .admin-panel textarea:focus, .admin-panel select:focus { border-color: #0a0a0a; }
.admin-panel input.edited { color: #ff481d; border-color: rgba(255,72,29,0.4); }
.admin-panel input.saved { color: #3b8d57; border-color: rgba(59,141,87,0.4); }
.admin-panel input.err { color: #c33020; border-color: rgba(195,48,32,0.6); }

/* Tables */
.admin-panel .admin-results-table {
  background: #fff;
  border: 1px solid #d8d2c5;
  width: 100%;
  border-collapse: collapse;
}
.admin-panel .admin-results-table th {
  background: #fff;
  color: #ff481d;
  border-bottom: 1px solid #d8d2c5;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  padding: 14px 16px;
  text-align: left;
}
.admin-panel .admin-results-table td {
  color: #0a0a0a;
  border-bottom: 1px solid #ece5d7;
  padding: 14px 16px;
  font-size: 13px;
  vertical-align: middle;
}
.admin-panel .admin-results-table tbody tr:hover { background: #faf6ee; }
.admin-panel .admin-results-table .arch-cell { color: #0a0a0a; }

/* Inner panels (cloud sync, mailer config, etc.) */
.admin-panel .admin-cloud-panel {
  background: #fff !important;
  border: 1px solid #d8d2c5 !important;
  border-radius: 0 !important;
  padding: 22px 24px !important;
  color: #0a0a0a;
}
.admin-panel .admin-cloud-panel > div[style*="color:var(--amber)"] { color: #ff481d !important; }
.admin-panel .admin-cloud-panel code { background: rgba(0,0,0,0.04); color: #0a0a0a; padding: 1px 6px; }

/* Scoring / pacing blocks */
.admin-panel .scoring-block,
.admin-panel .pacing-skin-block {
  background: #fff;
  border: 1px solid #d8d2c5;
  padding: 20px 22px;
  margin-bottom: 16px;
}
.admin-panel .scoring-tag,
.admin-panel .pacing-skin-name { color: #ff481d; font-weight: 600; }
.admin-panel .pacing-skin-name {
  font-family: "Inter", sans-serif !important;
  font-style: normal !important;
  font-weight: 800;
  font-size: 20px;
  text-transform: uppercase;
}
.admin-panel .pacing-skin-active {
  background: #0a0a0a; color: #fff; border-color: #0a0a0a;
}
.admin-panel .pacing-scene-block { border-top-color: #ece5d7; }
.admin-panel .pacing-field-help,
.admin-panel .pacing-field-label,
.admin-panel .pacing-field-unit { color: #555048; }
.admin-panel .pacing-field-help { font-family: "Inter", sans-serif; font-style: normal; }

/* Edit rows (Content tab) */
.admin-panel .admin-edit-row {
  background: #fff;
  border: 1px solid #d8d2c5;
  padding: 14px 18px;
  margin-bottom: 10px;
}
.admin-panel .admin-content-search {
  margin: 18px 0;
}
.admin-panel .admin-content-search input { width: 100%; padding: 12px 14px; font-size: 14px; }

/* Preview banner (admin override mode) */
body.previewing .preview-banner {
  background: #0a0a0a; color: #fff;
}

/* Content-tab skin switcher */
.admin-panel .admin-skin-switcher {
  background: #fff;
  border: 1px solid #d8d2c5;
  padding: 16px 20px;
  margin-bottom: 22px;
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
}
.admin-panel .admin-skin-switcher-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #ff481d;
}
.admin-panel .admin-skin-switcher-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.admin-panel .admin-skin-pill {
  background: transparent;
  border: 1px solid #d8d2c5;
  color: #1c1c1c;
  font-family: "Inter", sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.admin-panel .admin-skin-pill:hover { border-color: #0a0a0a; }
.admin-panel .admin-skin-pill.active {
  background: #0a0a0a;
  color: #fff;
  border-color: #0a0a0a;
}

/* Hide site chrome behind admin */
body.admin-open .admin-link { display: none !important; }
body.admin-open .back-button,
body.admin-open .bl-stack,
body.admin-open .progress-rail,
body.admin-open .location-tag,
body.admin-open #timerRing { display: none !important; }
body.admin-open .logo-tr { display: none !important; }

/* Suppress the assessment-stage flash on the brief windows when the user
   is entering (page load → openAdmin) or leaving (closeAdmin → window
   navigation) admin mode. Applied as soon as <html> is parsed, before
   any of the cinematic CSS gets a chance to render. */
html.admin-mode { background: #f4f0e8; }
html.admin-mode body {
  background: #f4f0e8 !important;
  cursor: default !important;
}
html.admin-mode #stage,
html.admin-mode #resultsStage,
html.admin-mode .bl-stack,
html.admin-mode .progress-rail,
html.admin-mode .location-tag,
html.admin-mode .back-button,
html.admin-mode .logo-tr,
html.admin-mode .grain,
html.admin-mode .vignette,
html.admin-mode .gradient-wash,
html.admin-mode #particles,
html.admin-mode .cursor,
html.admin-mode .cursor-glow,
html.admin-mode #timerRing,
html.admin-mode .admin-link { display: none !important; }

/* Viewer mode: we want the cinematic chrome hidden (no flash) but the
   results stage MUST be visible. .session-viewer overrides admin-mode's
   blanket hide for #resultsStage and the cursor effects that the results
   page also relies on. */
html.session-viewer #resultsStage { display: block !important; }
html.session-viewer.admin-mode #resultsStage.active { display: block !important; }

/* ─── Subtle back button ─── */
.back-button {
  position: fixed;
  top: 3.6vh;
  left: 4vw;
  z-index: 56;
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 14px 8px 10px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.05);
  color: var(--ink-label);
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.5s var(--ease);
  border-radius: 100px;
}

.back-button.visible { display: inline-flex; }
.back-button:hover { color: var(--amber); border-color: rgba(255,90,44,0.4); background: rgba(255,90,44,0.04); }
.back-button svg path { transition: stroke 0.4s var(--ease); }

/* Push location-tag right when back button visible */
.back-button.visible ~ .location-tag,
body.has-back .location-tag { left: calc(4vw + 100px); }

@media (max-width: 720px) {
  .back-button { top: 2.6vh; padding: 6px 10px 6px 8px; font-size: 8px; }
  body.has-back .location-tag { left: calc(4vw + 90px); top: 2.9vh; }
}

/* ─── Mandarin brand mark, now a child of .bl-stack, not fixed ─── */
.brand-mark {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--ink-label);
  pointer-events: none;
  opacity: 1;            /* parent .bl-stack controls overall opacity */
  padding: 0;
}


.brand-mark .brand-dot {
  display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--brand-orange);
  box-shadow: 0 0 8px rgba(255, 72, 29, 0.6);
}

.brand-mark .brand-name {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: none;
  color: var(--ink-soft);
  margin-left: 2px;
}

/* ─── Intake form ─── */
.intake-block {
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.intake-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 24px;
}

@media (max-width: 600px) {
  .intake-grid { grid-template-columns: 1fr; }
}

.intake-field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.intake-field.full { grid-column: 1 / -1; }

.intake-label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--amber);
}

.intake-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255, 90, 44, 0.3);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 300;
  padding: 12px 0;
  outline: none;
  transition: border-color 0.4s var(--ease);
  font-style: italic;
}

.intake-input::placeholder { color: var(--ink-dim); }
.intake-input:focus { border-bottom-color: var(--amber); }

.intake-gender {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
}

@media (max-width: 480px) {
  .intake-gender { grid-template-columns: 1fr 1fr; }
}

.intake-gender-opt {
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.012);
  cursor: pointer;
  transition: all 0.4s var(--ease);
  text-align: left;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink-soft);
  font-weight: 300;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.intake-gender-opt .opt-label {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--ink);
}

.intake-gender-opt .opt-sub {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
}

.intake-gender-opt:hover {
  background: rgba(255, 90, 44, 0.05);
  border-color: rgba(255, 90, 44, 0.3);
}

.intake-gender-opt.selected {
  background: rgba(255, 90, 44, 0.08);
  border-color: var(--amber);
}

.intake-consent {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-mute);
  line-height: 1.5;
  margin-top: 8px;
}

.intake-error {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--amber);
  min-height: 14px;
  margin-top: 4px;
}

/* ─── RESPONSIVE / SCROLLING, make scenes scrollable when content overflows ─── */
.stage {
  position: relative;
  width: 100vw;
  min-height: 100vh;
  z-index: 10;
  overflow-x: hidden;
}

.scene {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 1.4s var(--ease), visibility 0s linear 1.4s;
  /* Safe zones, top for frame meta + back button, bottom for brand mark + timer ring */
  padding: 9vh 6vw 12vh;
  overflow-y: auto;
  overflow-x: hidden;
}

.scene.active {
  opacity: 1;
  visibility: visible;
  transition: opacity 1.6s var(--ease), visibility 0s linear 0s;
}

.scene::-webkit-scrollbar { width: 4px; }
.scene::-webkit-scrollbar-track { background: transparent; }
.scene::-webkit-scrollbar-thumb { background: rgba(255, 90, 44, 0.25); }

.scene > .scene-inner,
.scene > .scene-content-wrap {
  width: 100%;
  margin: auto;
}

/* MOBILE: tighter spacing, smaller serif scale, single-column for everything */
@media (max-width: 720px) {
  .scene { padding: 5vh 5vw; }

  .layout-split .scene-inner,
  .layout-disc-left .scene-inner,
  .layout-disc-right .scene-inner {
    grid-template-columns: 1fr !important;
    gap: 32px;
    text-align: center;
    justify-items: center;
  }

  .disc {
    width: min(72vw, 360px) !important;
  }

  .narrative-quote {
    font-size: clamp(22px, 6vw, 32px) !important;
    text-align: left;
  }

  .q-prompt {
    font-size: clamp(22px, 5.5vw, 28px) !important;
  }

  .narrative-body {
    font-size: clamp(16px, 4.5vw, 22px) !important;
  }

  .landing-title {
    font-size: clamp(44px, 12vw, 84px) !important;
  }

  .frame-meta { font-size: 9px; letter-spacing: 0.2em; }
  .frame-meta .left { max-width: 60%; }

  .location-tag { font-size: 9px; letter-spacing: 0.25em; top: 3vh; left: 5vw; }

  .timer-ring { width: 44px; height: 44px; bottom: 4vh; right: 5vw; }

  .brand-mark .brand-name { font-size: 11px; }

  .results-hero-grid { gap: 24px; padding: 4vh 0 2vh; }
  .archetype-portrait { width: min(72vw, 320px); height: min(72vw, 320px); }
  .hero-score-mini { font-size: clamp(64px, 18vw, 120px); }

  .wheel-stage { gap: 32px; }

  .next-steps-grid { grid-template-columns: 1fr; }

  .scene-inner.layout-centered { padding: 8vh 0; }
}

/* TABLET */
@media (max-width: 980px) and (min-width: 721px) {
  .scene { padding: 5vh 6vw; }
  .layout-disc-left .scene-inner,
  .layout-disc-right .scene-inner { grid-template-columns: 1fr !important; gap: 40px; }
}

/* SHORT VIEWPORTS, let scenes scroll instead of clipping */
@media (max-height: 760px) {
  .scene { align-items: flex-start; padding-top: 8vh; }
  .landing-meta { display: none; }
}

/* ─── Scene transition wipe ─── */
.scene-wipe {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 80;
  background: linear-gradient(to right, rgba(255, 90, 44,0.0), rgba(255, 90, 44,0.06), rgba(255, 90, 44,0.0));
  transform: translateX(-100%);
  opacity: 0;
}

.scene-wipe.run {
  animation: wipe 1.6s var(--ease) forwards;
}

@keyframes wipe {
  0%   { transform: translateX(-100%); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translateX(100%); opacity: 0; }
}
</style>

const USER = {
  firstName: '',
  lastName:  '',
  email:     '',
  gender:    'they' // 'she' | 'he' | 'they'
};

const PRONOUN_SETS = {
  she:  { they:'she',  them:'her',  their:'her',   theirs:'hers',  themself:'herself',  is:'is',  are:'is' },
  he:   { they:'he',   them:'him',  their:'his',   theirs:'his',   themself:'himself',  is:'is',  are:'is' },
  they: { they:'they', them:'them', their:'their', theirs:'theirs',themself:'themself', is:'are', are:'are' }
};

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function personalize(text) {
  if (typeof text !== 'string') return text;
  const p = PRONOUN_SETS[USER.gender] || PRONOUN_SETS.they;
  return text
    .replace(/\{\{firstName\}\}/g, USER.firstName || 'Citizen')
    .replace(/\{\{lastName\}\}/g,  USER.lastName  || '')
    .replace(/\{\{they\}\}/g,    p.they)
    .replace(/\{\{them\}\}/g,    p.them)
    .replace(/\{\{their\}\}/g,   p.their)
    .replace(/\{\{theirs\}\}/g,  p.theirs)
    .replace(/\{\{themself\}\}/g,p.themself)
    .replace(/\{\{They\}\}/g,    cap(p.they))
    .replace(/\{\{Them\}\}/g,    cap(p.them))
    .replace(/\{\{Their\}\}/g,   cap(p.their))
    .replace(/\{\{Theirs\}\}/g,  cap(p.theirs))
    .replace(/\{\{Themself\}\}/g,cap(p.themself))
    .replace(/\{\{is\}\}/g,      p.is)
    .replace(/\{\{are\}\}/g,     p.are);
}

// Walk an object/scene and personalize all string values
function personalizeScene(scene) {
  if (!scene || typeof scene !== 'object') return scene;
  const clone = Array.isArray(scene) ? [] : {};
  Object.entries(scene).forEach(([k, v]) => {
    if (typeof v === 'string') clone[k] = personalize(v);
    else if (Array.isArray(v)) clone[k] = v.map(x => typeof x === 'string' ? personalize(x) : (typeof x === 'object' && x !== null ? personalizeScene(x) : x));
    else if (typeof v === 'object' && v !== null) clone[k] = personalizeScene(v);
    else clone[k] = v;
  });
  return clone;
}

const SKINS_LS_KEY = 'mandarin.assessment.currentSkin';
const SKINS_REGISTRY_LS_KEY = 'mandarin.assessment.skinRegistry';
const PACING_LS_KEY = 'mandarin.assessment.pacingOverrides';

// Defaults the renderers fall back to when a crawl scene has no override.
// Values in milliseconds. Exposed in the admin Pacing tab.
const PACING_DEFAULTS = {
  film:       { preambleDelay: 1000,  titleDelay: 10000, scrollStartDelay: 21000, scrollDuration: 33000 },
  briefing:   { preambleDelay: 1200,  titleDelay: 5500,  bodyStartDelay: 10000, bodyStagger: 8000 },
  scroll:     { preambleDelay: 1400,  frameDelay: 3000,  bodyStartDelay: 10000, bodyStagger: 8000 },
  broadsheet: { frameDelay: 1000,     bodyStartDelay: 5000,  bodyStagger: 8000 }
};

// Map field names to the CSS custom-property names they set per crawl style.
// Only keys present here are wired to CSS, scene-duration / scroll / body
// values are handled in the JS renderers directly.
const PACING_CSS_VARS = {
  film:       { preambleDelay: '--film-preamble-delay',     titleDelay: '--film-title-delay' },
  briefing:   { preambleDelay: '--brief-preamble-delay',    titleDelay: '--brief-title-delay' },
  scroll:     { preambleDelay: '--scroll-preamble-delay',   frameDelay: '--scroll-frame-delay' },
  broadsheet: { frameDelay:    '--broad-frame-delay' }
};

// All tunable fields per style (used by the admin UI + reset paths).
const PACING_ALL_FIELDS = {
  film:       ['duration', 'preambleDelay', 'titleDelay', 'scrollStartDelay', 'scrollDuration'],
  briefing:   ['duration', 'preambleDelay', 'titleDelay', 'bodyStartDelay', 'bodyStagger'],
  scroll:     ['duration', 'preambleDelay', 'frameDelay', 'bodyStartDelay', 'bodyStagger'],
  broadsheet: ['duration', 'frameDelay', 'bodyStartDelay', 'bodyStagger']
};

// Storage shape:
//   { '<skin_id>': { '<scene_index>': { duration?, scrollStartDelay?, scrollDuration?,
//                                       bodyStartDelay?, bodyStagger? } } }
function loadPacingOverrides() {
  try { return JSON.parse(localStorage.getItem(PACING_LS_KEY) || '{}') || {}; }
  catch (e) { return {}; }
}

function persistPacingOverrides(obj) {
  try { localStorage.setItem(PACING_LS_KEY, JSON.stringify(obj)); } catch (e) {}
}

// Mutate SCENES in place: overwrite pacing fields on crawl scenes where the
// user has supplied overrides for the active skin.
function applyPacingOverridesToScenes(skinId) {
  const all = loadPacingOverrides();
  const forSkin = all[skinId] || {};
  for (let i = 0; i < SCENES.length; i++) {
    const s = SCENES[i];
    if (!s || s.type !== 'crawl') continue;
    const o = forSkin[i];
    if (!o) continue;
    const style = s.crawlStyle || 'film';
    const fields = PACING_ALL_FIELDS[style] || [];
    fields.forEach(f => {
      if (typeof o[f] === 'number') s[f] = o[f];
    });
  }
}

// Build the CSS-var inline-style string for a crawl scene, picking the field
// values from either the scene's pacing-overridden field or the style default.
function buildCrawlPacingStyle(scene) {
  const style = scene.crawlStyle || 'film';
  const vars = PACING_CSS_VARS[style] || {};
  const defaults = PACING_DEFAULTS[style] || {};
  const parts = [];
  Object.entries(vars).forEach(([field, cssVar]) => {
    const ms = (typeof scene[field] === 'number') ? scene[field] : defaults[field];
    if (typeof ms === 'number') parts.push(`${cssVar}:${ms}ms`);
  });
  // Film-only: scroll timing too (kept here so renderCrawlFilm only writes one string)
  if (style === 'film') {
    const startMs = (typeof scene.scrollStartDelay === 'number') ? scene.scrollStartDelay : defaults.scrollStartDelay;
    const durMs   = (typeof scene.scrollDuration   === 'number') ? scene.scrollDuration   : defaults.scrollDuration;
    parts.push(`--crawl-scroll-delay:${startMs}ms`);
    parts.push(`--crawl-scroll-duration:${durMs}ms`);
  }
  return parts.join(';');
}

// Convenience: write a single field override and re-apply if the active skin.
function setPacingOverride(skinId, sceneIdx, field, value) {
  const all = loadPacingOverrides();
  if (!all[skinId]) all[skinId] = {};
  if (!all[skinId][sceneIdx]) all[skinId][sceneIdx] = {};
  if (value === null || value === undefined || Number.isNaN(value)) {
    delete all[skinId][sceneIdx][field];
    if (Object.keys(all[skinId][sceneIdx]).length === 0) delete all[skinId][sceneIdx];
    if (Object.keys(all[skinId]).length === 0) delete all[skinId];
  } else {
    all[skinId][sceneIdx][field] = value;
  }
  persistPacingOverrides(all);
  if (skinId === STATE.currentSkin) {
    // Re-apply so the change takes effect immediately for re-rendered scenes.
    applyPacingOverridesToScenes(skinId);
  }
}

function resetPacingForScene(skinId, sceneIdx) {
  const all = loadPacingOverrides();
  if (all[skinId] && all[skinId][sceneIdx]) {
    delete all[skinId][sceneIdx];
    if (Object.keys(all[skinId]).length === 0) delete all[skinId];
    persistPacingOverrides(all);
  }
  // Restore the scene's pacing fields from the original skin definition.
  const skin = SKINS[skinId];
  if (skin && Array.isArray(skin.scenes) && skin.scenes[sceneIdx]) {
    const orig = skin.scenes[sceneIdx];
    if (skinId === STATE.currentSkin && SCENES[sceneIdx]) {
      const live = SCENES[sceneIdx];
      const style = orig.crawlStyle || 'film';
      // Restore (or delete) every tunable field for this style.
      (PACING_ALL_FIELDS[style] || []).forEach(k => {
        if (typeof orig[k] === 'number') live[k] = orig[k];
        else delete live[k];
      });
    }
  }
}

const SKINS = { force_trial: SKIN_FORCE_TRIAL };

// Deep clone that preserves function values (SECONDARY_PATTERNS has triggers).
function deepCloneSkin(obj) {
  if (obj === null || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map(deepCloneSkin);
  const out = {};
  for (const k in obj) {
    const v = obj[k];
    out[k] = typeof v === 'function' ? v : deepCloneSkin(v);
  }
  return out;
}

// Snapshot the live globals as the default skin's content, so switching to
// another skin and back actually restores the originals.
function bindForceTrialReferences() {
  SKIN_FORCE_TRIAL.scenes            = deepCloneSkin(SCENES);
  SKIN_FORCE_TRIAL.archetypes        = deepCloneSkin(ARCHETYPES);
  SKIN_FORCE_TRIAL.secondaryPatterns = deepCloneSkin(SECONDARY_PATTERNS);
  SKIN_FORCE_TRIAL.riskCopy          = deepCloneSkin(RISK_COPY);
  SKIN_FORCE_TRIAL.nextSteps         = deepCloneSkin(NEXT_STEPS);
  SKIN_FORCE_TRIAL.imageMap          = deepCloneSkin(IMAGE_MAP);
}

// Load any builtin skins embedded in the HTML as <script type="application/json"> blocks
function loadBuiltinSkins() {
  document.querySelectorAll('script[type="application/json"][id^="builtin-skin-"]').forEach(el => {
    try {
      const skin = JSON.parse(el.textContent);
      if (!skin || !skin.id || skin.id === 'force_trial') return;
      // User-imported edits to the same id take precedence (loaded later)
      if (!SKINS[skin.id]) {
        skin._builtin = true;
        SKINS[skin.id] = skin;
      }
    } catch (e) {
      console.warn('Could not parse builtin skin', el.id, e);
    }
  });
}

// Load any user-imported skins from localStorage
function loadImportedSkins() {
  try {
    const raw = localStorage.getItem(SKINS_REGISTRY_LS_KEY);
    if (!raw) return;
    const imported = JSON.parse(raw);
    Object.entries(imported).forEach(([id, skin]) => {
      if (id !== 'force_trial') SKINS[id] = skin;
    });
  } catch (e) { /* ignore corrupt storage */ }
}

function persistImportedSkins() {
  const toSave = {};
  Object.entries(SKINS).forEach(([id, skin]) => {
    if (id !== 'force_trial') toSave[id] = skin;
  });
  try { localStorage.setItem(SKINS_REGISTRY_LS_KEY, JSON.stringify(toSave)); } catch (e) {}
}

function getCurrentSkin() {
  return SKINS[STATE.currentSkin] || SKIN_FORCE_TRIAL;
}

// Replace the live globals in place with a different skin's content.
function applySkin(skinId, opts) {
  opts = opts || {};
  const skin = SKINS[skinId];
  if (!skin) return false;

  // 1. Swap scenes (mutate in place, many closures hold a reference to SCENES)
  if (Array.isArray(skin.scenes)) {
    SCENES.length = 0;
    skin.scenes.forEach(s => SCENES.push(s));
    // Layer pacing overrides on top of the fresh scenes for this skin
    applyPacingOverridesToScenes(skinId);
  }

  // 2. Swap object-based content (mutate in place, keep referential identity)
  function replaceObject(target, source) {
    if (!source) return;
    Object.keys(target).forEach(k => delete target[k]);
    Object.entries(source).forEach(([k, v]) => target[k] = v);
  }
  if (skin.archetypes)        replaceObject(ARCHETYPES, skin.archetypes);
  if (skin.secondaryPatterns) {
    // Secondary patterns carry trigger() functions, framework logic, not skin.
    // JSON-imported skins lose them. Preserve the defaults across the swap.
    const defaultPatterns = (SKIN_FORCE_TRIAL.secondaryPatterns || SECONDARY_PATTERNS);
    Object.keys(SECONDARY_PATTERNS).forEach(k => delete SECONDARY_PATTERNS[k]);
    Object.entries(skin.secondaryPatterns).forEach(([k, v]) => {
      const trigger = (v && typeof v.trigger === 'function')
        ? v.trigger
        : (defaultPatterns[k] && defaultPatterns[k].trigger) || (() => false);
      SECONDARY_PATTERNS[k] = Object.assign({}, v, { trigger });
    });
  }
  if (skin.riskCopy)          replaceObject(RISK_COPY, skin.riskCopy);
  if (skin.nextSteps)         replaceObject(NEXT_STEPS, skin.nextSteps);
  if (skin.imageMap && skin.imageMap.scene) {
    Object.keys(IMAGE_MAP.scene).forEach(k => delete IMAGE_MAP.scene[k]);
    Object.entries(skin.imageMap.scene).forEach(([k, v]) => IMAGE_MAP.scene[k] = v);
  }
  // Archetype dir, each skin's PNGs live under its own subfolder.
  // Priority: explicit imageMap.archetypeDir → infer from first scene path → default.
  function inferArchDir() {
    if (skin.imageMap && skin.imageMap.archetypeDir) return skin.imageMap.archetypeDir;
    const samplePath = Object.values((skin.imageMap && skin.imageMap.scene) || {}).find(Boolean);
    if (samplePath && samplePath.includes('/')) return samplePath.replace(/[^/]+$/, '');
    return skinId === 'force_trial' ? 'images/' : `images/skin-${skinId.replace(/_/g,'-')}/`;
  }
  IMAGE_MAP.archetypeDir = inferArchDir();
  // Reset probe cache for this skin and re-probe in the background. Crucially
  // we DO NOT call renderCurrent() from the probe, that fires asynchronously
  // (after every PNG either loads or 404s) and would race with the user's own
  // scene transitions, causing the previous scene to remain visible during
  // the 1.4s fade. The next natural renderCurrent (a click, a back, an
  // admin action) will pick up the fresh IMAGE_AVAILABLE cache and swap in
  // any newly-detected PNGs.
  Object.keys(IMAGE_AVAILABLE).forEach(k => delete IMAGE_AVAILABLE[k]);
  probeAllImages();

  // 3. Apply theme CSS variables to :root + optional font import
  if (skin.theme) {
    const root = document.documentElement;
    Object.entries(skin.theme).forEach(([k, v]) => {
      if (k === 'fontImport' || k === 'fontLinkHref') return; // handled below
      if (k.startsWith('--')) root.style.setProperty(k, v);
    });
    if (skin.theme.fontImport) {
      let link = document.getElementById('skin-fonts');
      if (!link) {
        link = document.createElement('link');
        link.id = 'skin-fonts';
        link.rel = 'stylesheet';
        document.head.appendChild(link);
      }
      link.href = skin.theme.fontImport;
    }
  }

  // 4. Update state + body skin classes (so skins can opt into overlay effects)
  STATE.currentSkin = skinId;
  // Clear any previous skin-* classes, then apply the requested one(s)
  document.body.classList.forEach(c => { if (c.startsWith('skin-')) document.body.classList.remove(c); });
  if (Array.isArray(skin.bodyClasses)) {
    skin.bodyClasses.forEach(c => document.body.classList.add(c));
  }
  try { localStorage.setItem(SKINS_LS_KEY, skinId); } catch (e) {}

  // 5. Re-render, fresh start unless caller asks to keep position
  if (!opts.preserveProgress) {
    STATE.current = 0;
    STATE.answers = {};
    STATE.reflections = {};
    Object.keys(STATE.scores.practices).forEach(k => STATE.scores.practices[k] = []);
    Object.keys(STATE.scores.risks).forEach(k => STATE.scores.risks[k] = []);
    document.getElementById('resultsStage').classList.remove('active');
    document.getElementById('resultsStage').innerHTML = '';
    document.getElementById('stage').style.display = '';
  }
  if (typeof renderCurrent === 'function' && !opts.skipRender) renderCurrent();
  return true;
}

function importSkin(jsonText) {
  let skin;
  try { skin = JSON.parse(jsonText); }
  catch (e) { return { ok: false, error: 'Invalid JSON: ' + e.message }; }
  if (!skin || !skin.id || !skin.name) return { ok: false, error: 'Skin must have id and name' };
  if (!Array.isArray(skin.scenes)) return { ok: false, error: 'Skin must include a scenes array' };
  if (skin.id === 'force_trial') return { ok: false, error: 'Cannot overwrite the default skin' };
  SKINS[skin.id] = skin;
  persistImportedSkins();
  return { ok: true, id: skin.id };
}

function exportSkin(skinId) {
  const skin = SKINS[skinId];
  if (!skin) return;
  // For the default skin, dump the live content
  const payload = (skinId === 'force_trial')
    ? { ...skin, scenes: SCENES, archetypes: ARCHETYPES, secondaryPatterns: SECONDARY_PATTERNS, riskCopy: RISK_COPY, nextSteps: NEXT_STEPS, imageMap: IMAGE_MAP }
    : skin;
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `skin-${skinId}.json`; a.click();
  URL.revokeObjectURL(url);
}

function deleteSkin(skinId) {
  if (skinId === 'force_trial') return false;
  if (!SKINS[skinId]) return false;
  delete SKINS[skinId];
  persistImportedSkins();
  if (STATE.currentSkin === skinId) applySkin('force_trial');
  return true;
}

function applyScore(scoreObj) {
  if (!scoreObj) return;
  Object.entries(scoreObj).forEach(([k, v]) => {
    if (STATE.scores.practices[k] !== undefined) STATE.scores.practices[k].push(v);
    if (STATE.scores.risks[k] !== undefined) STATE.scores.risks[k].push(v);
  });
}

function avg(arr) {
  if (!arr.length) return 50;
  return arr.reduce((a,b) => a+b, 0) / arr.length;
}

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

// ─── Running flags: read accumulated risk + key practice scores mid-flight ───
function getRunningFlags() {
  const r = STATE.scores.risks;
  const p = STATE.scores.practices;
  const a = arr => arr.length ? arr.reduce((x,y)=>x+y,0) / arr.length : 0;
  const flags = {
    control: a(r.control_bias),
    drift:   a(r.moral_drift),
    detach:  a(r.detachment_pressure),
    listen:  a(p.listen_deeply),
    aware:   a(p.understand_self),
    challenge: a(p.act_decisively),
    creative: a(p.unlock_creativity)
  };
  // Boolean clauses
  flags.leaning_hale    = flags.control >= 35 || flags.drift >= 25;
  flags.resisting_hale  = flags.challenge >= 55 && flags.control < 25;
  flags.staying_curious = flags.listen >= 60 && flags.aware >= 60;
  flags.drifting        = flags.drift >= 30 || flags.detach >= 35;
  return flags;
}

// Apply variant copy to a scene before render, non-destructive clone
function applyConditional(scene) {
  if (!scene.variants) return scene;
  const flags = getRunningFlags();
  const clone = JSON.parse(JSON.stringify(scene));
  Object.entries(scene.variants).forEach(([flagKey, override]) => {
    if (flags[flagKey]) {
      Object.assign(clone, override);
    }
  });
  return clone;
}

function computeResults() {
  const p = {};
  Object.keys(STATE.scores.practices).forEach(k => {
    p[k] = clamp(Math.round(avg(STATE.scores.practices[k])), 0, 100);
  });
  const levels = {
    L1: Math.round((p.understand_self + p.master_emotions + p.embed_practices) / 3),
    L2: Math.round((p.be_curious + p.listen_deeply + p.think_critically) / 3),
    L3: Math.round((p.unlock_creativity + p.manage_uncertainty + p.future_focused) / 3),
    L4: Math.round((p.act_decisively + p.collaborate_inclusively + p.influence_effortlessly) / 3)
  };
  const overall = Math.round(Object.values(p).reduce((a,b)=>a+b,0) / 12);
  const r = {};
  Object.keys(STATE.scores.risks).forEach(k => {
    r[k] = clamp(Math.round(avg(STATE.scores.risks[k].length ? STATE.scores.risks[k] : [0])), 0, 100);
  });
  return { practices: p, levels, overall, risks: r };
}

function pickArchetype(R) {
  const { overall, levels, risks } = R;
  const maxRisk = Math.max(risks.control_bias, risks.moral_drift, risks.detachment_pressure);
  // Rules are editable via admin → Rules tab
  const r = (typeof RULES !== 'undefined' ? RULES : RULE_DEFAULTS) || RULE_DEFAULTS;
  if (overall >= r.fm_overall_min &&
      levels.L1 >= r.fm_level_min && levels.L2 >= r.fm_level_min &&
      levels.L3 >= r.fm_level_min && levels.L4 >= r.fm_level_min &&
      maxRisk <= r.fm_max_risk) {
    return 'force_multiplier';
  }
  if (overall > r.band_drift_max) {
    if (maxRisk > r.so_demote_risk_threshold) return 'hidden_drifter';
    return 'strategic_operator';
  }
  if (overall > r.band_tactical_max) return 'hidden_drifter';
  if (overall > r.band_infancy_max)  return 'tactical_survivor';
  return 'reactive_defender';
}

function pickSecondaryPattern(R) {
  // Always returns a pattern key. First checks if any trigger fires (priority
  // order). If none do, returns the pattern whose user is *closest* to its
  // threshold, so every result shows a meaningful secondary tilt.
  const keys = ['architect_of_order','the_justifier','the_calm_blade','the_consensus_seeker','the_decisive_commander','vision_under_strain'];
  // Pass 1: hard triggers
  for (const key of keys) {
    const p = SECONDARY_PATTERNS[key];
    if (!p || typeof p.trigger !== 'function') continue;
    try { if (p.trigger(R)) return key; } catch (e) {}
  }
  // Pass 2: nearest-to-threshold tilt, distance is how far the user is from triggering.
  const r = (typeof RULES !== 'undefined' ? RULES : RULE_DEFAULTS) || RULE_DEFAULTS;
  const distances = {
    architect_of_order:       r.secondary_control_bias_min - R.risks.control_bias,
    the_justifier:            r.secondary_moral_drift_min  - R.risks.moral_drift,
    the_calm_blade:           r.secondary_detachment_min   - R.risks.detachment_pressure,
    the_consensus_seeker:     Math.max(
                                r.secondary_collab_high - R.practices.collaborate_inclusively,
                                R.practices.act_decisively - r.secondary_act_low + 0.01),
    the_decisive_commander:   Math.max(
                                r.secondary_act_high - R.practices.act_decisively,
                                R.practices.listen_deeply - r.secondary_listen_low + 0.01),
    vision_under_strain:      Math.max(
                                r.secondary_future_high - R.practices.future_focused,
                                R.practices.master_emotions - r.secondary_emotions_low + 0.01)
  };
  // Smaller distance = closer to triggering = more apt tilt. Negative distance means already triggered.
  let best = keys[0], bestD = Infinity;
  for (const k of keys) {
    if (SECONDARY_PATTERNS[k] && typeof distances[k] === 'number' && distances[k] < bestD) {
      best = k; bestD = distances[k];
    }
  }
  return best;
}

function escapeHTML(s) { return s.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

function wordReveal(text, delayBase = 0) {
  // Tokenize keeping <em>/</em> markers so they can wrap individual words cleanly,
  // even when em spans multiple words.
  const tokens = text.split(/(<em>|<\/em>|\s+)/).filter(t => t && t.length > 0);
  let inEm = false;
  let idx = 0;
  let out = '';
  tokens.forEach(tok => {
    if (tok === '<em>') { inEm = true; }
    else if (tok === '</em>') { inEm = false; }
    else if (/^\s+$/.test(tok)) { out += ' '; }
    else {
      const delay = delayBase + idx * 70;
      const content = inEm ? `<em>${tok}</em>` : tok;
      out += `<span class="reveal-word" style="transition-delay:${delay}ms">${content}</span>`;
      idx++;
    }
  });
  return out;
}

function wordRevealArr(arr, delayBase = 0) {
  let cur = delayBase;
  return arr.map(line => {
    const html = wordReveal(line, cur);
    cur += line.split(' ').length * 70 + 200;
    return `<span class="reveal-line">${html}</span>`;
  }).join('');
}

// ─────────── Render a scene
function renderCrawl(scene) {
  // Skin can opt into an alternative opening style.
  const style = scene.crawlStyle || 'film';
  if (style === 'briefing')   return renderCrawlBriefing(scene);
  if (style === 'scroll')     return renderCrawlScroll(scene);
  if (style === 'broadsheet') return renderCrawlBroadsheet(scene);
  return renderCrawlFilm(scene);
}

function renderCrawlFilm(scene) {
  // Pacing overrides, if set, drive CSS animation timing via custom properties
  // applied to the scene container. CSS rules read them with var() fallbacks.
  const paceStyle = buildCrawlPacingStyle(scene);
  return `
    <div class="crawl-stars"></div>
    <div class="crawl-preamble" style="${paceStyle}">${scene.preamble}</div>
    <div class="crawl-title-wrap" style="${paceStyle}">
      <div class="crawl-title-episode">${scene.episode}</div>
      <div class="crawl-title-main">
        ${scene.title.map(w => `<span>${w}</span>`).join('')}
      </div>
    </div>
    <div class="crawl-viewport" style="${paceStyle}">
      <div class="crawl-text" style="${paceStyle}">
        ${scene.paragraphs.map(p => `<p>${p}</p>`).join('')}
      </div>
    </div>
    <div class="crawl-fade"></div>
    <div class="crawl-horizon"></div>
  `;
}

// NASA-briefing style opening, used by the Apollo skin (and any other where
// the "Star Wars receding crawl" feel is wrong). Title slate, three paragraph
// cards in sequence, then a countdown card → whoosh into Act 1.
function renderCrawlBriefing(scene) {
  const paras = (scene.paragraphs || []).slice(0, 3);
  const countdown = scene.countdown || 'T - 00:38:00:00 · GO FOR PROLOGUE';
  const defaultMark = `<svg viewBox="0 0 200 200" aria-hidden="true">
    <circle cx="100" cy="100" r="92" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <ellipse cx="100" cy="100" rx="80" ry="34" fill="none" stroke="currentColor" stroke-width="1" transform="rotate(-22 100 100)"/>
    <ellipse cx="100" cy="100" rx="80" ry="34" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.6" transform="rotate(22 100 100)"/>
    <circle cx="100" cy="100" r="6" fill="currentColor"/>
    <circle cx="100" cy="100" r="68" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 4"/>
  </svg>`;
  const paceStyle = buildCrawlPacingStyle(scene);
  return `
    <div class="brief-scanlines"></div>
    <div class="brief-preamble" style="${paceStyle}">${scene.preamble || ''}</div>
    <div class="brief-title" style="${paceStyle}">
      <div class="brief-meta">${scene.episode || 'Prologue'}</div>
      <div class="brief-mark">${scene.markSvg || defaultMark}</div>
      <h1 class="brief-title-main">${(scene.title || []).join(' ')}</h1>
    </div>
    ${(() => {
      const startSec = ((typeof scene.bodyStartDelay === 'number') ? scene.bodyStartDelay : PACING_DEFAULTS.briefing.bodyStartDelay) / 1000;
      const stepSec  = ((typeof scene.bodyStagger    === 'number') ? scene.bodyStagger    : PACING_DEFAULTS.briefing.bodyStagger)    / 1000;
      return `<div class="brief-cards">
      ${paras.map((p, i) => `<div class="brief-card" style="animation-delay:${(startSec + i*stepSec).toFixed(2)}s">
        <div class="brief-card-num">${String(i+1).padStart(2,'0')} / ${paras.length.toString().padStart(2,'0')}</div>
        <div class="brief-card-body">${p}</div>
      </div>`).join('')}
      <div class="brief-card brief-countdown" style="animation-delay:${(startSec + paras.length*stepSec).toFixed(2)}s">
        <div class="brief-card-num">FINAL CHECK</div>
        <div class="brief-card-body" style="font-family:monospace;font-size:clamp(20px,2.4vw,30px);letter-spacing:0.1em">${countdown}</div>
      </div>
    </div>`;
    })()}
    <div class="brief-horizon"></div>
  `;
}

// Joseon memorial-scroll opening, used by the Yi skin. A vertical hanging
// parchment, a stamped seal at the top, the title written down the centre,
// memorial verses appearing as ink-painted columns.
function renderCrawlScroll(scene) {
  const verses = (scene.paragraphs || []).slice(0, 3);
  const defaultMark = `<svg viewBox="0 0 200 200" aria-hidden="true">
    <rect x="40" y="40" width="120" height="120" fill="#b53536" stroke="#7a1818" stroke-width="2"/>
    <text x="100" y="125" text-anchor="middle" font-family="serif" font-size="80" fill="#f1e6cb" font-weight="700">忠</text>
  </svg>`;
  const paceStyle = buildCrawlPacingStyle(scene);
  return `
    <div class="scroll-paper"></div>
    <div class="scroll-preamble" style="${paceStyle}">${scene.preamble || ''}</div>
    <div class="scroll-frame" style="${paceStyle}">
      <div class="scroll-seal">${scene.markSvg || defaultMark}</div>
      <div class="scroll-title">${(scene.title || []).join(' ')}</div>
      <div class="scroll-meta">${scene.episode || ''}</div>
      <div class="scroll-divider"></div>
      ${(() => {
        const startSec = ((typeof scene.bodyStartDelay === 'number') ? scene.bodyStartDelay : PACING_DEFAULTS.scroll.bodyStartDelay) / 1000;
        const stepSec  = ((typeof scene.bodyStagger    === 'number') ? scene.bodyStagger    : PACING_DEFAULTS.scroll.bodyStagger)    / 1000;
        return `<div class="scroll-verses">
        ${verses.map((p, i) => `<div class="scroll-verse" style="animation-delay:${(startSec + i*stepSec).toFixed(2)}s">${p}</div>`).join('')}
      </div>
      <div class="scroll-footer" style="animation-delay:${(startSec + verses.length*stepSec).toFixed(2)}s">${scene.countdown || ''}</div>`;
      })()}
    </div>
    <div class="scroll-horizon"></div>
  `;
}

// Victorian broadsheet opening, used by the Latimer skin. An engraved
// masthead, a dateline rule, three sequential leader columns appearing as
// freshly inked print, then a final by-line stamp.
function renderCrawlBroadsheet(scene) {
  const paras = (scene.paragraphs || []).slice(0, 3);
  const defaultMark = `<svg viewBox="0 0 200 200" aria-hidden="true">
    <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="100" cy="100" r="60" fill="none" stroke="currentColor" stroke-width="0.6"/>
    <ellipse cx="100" cy="98" rx="22" ry="32" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <path d="M 88 110 Q 100 80 112 110" fill="none" stroke="currentColor" stroke-width="0.9"/>
  </svg>`;
  const paceStyle = buildCrawlPacingStyle(scene);
  return `
    <div class="broad-paper"></div>
    <div class="broad-frame" style="${paceStyle}">
      <div class="broad-dateline">${scene.preamble || ''}</div>
      <div class="broad-mast">
        <div class="broad-rule"></div>
        <div class="broad-emblem">${scene.markSvg || defaultMark}</div>
        <h1 class="broad-title">${(scene.title || []).join(' ')}</h1>
        <div class="broad-rule"></div>
        <div class="broad-byline">${scene.episode || ''}</div>
      </div>
      ${(() => {

function validateIntake() {
  const scope = currentSceneScope();
  const get = id => { const el = scope.querySelector('#' + id); return el ? el.value.trim() : ''; };
  const first = get('intakeFirst');
  const last  = get('intakeLast');
  const email = get('intakeEmail');
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const ready = first.length >= 1 && last.length >= 1 && emailOk && USER.gender;
  const adv = scope.querySelector('#qAdvance');
  if (adv) adv.classList.toggle('ready', !!ready);
  const err = scope.querySelector('#intakeError');
  if (err) err.textContent = '';
  return ready;
}

function submitIntake() {
  const scope = currentSceneScope();
  const get = id => { const el = scope.querySelector('#' + id); return el ? el.value.trim() : ''; };
  const first = get('intakeFirst');
  const last  = get('intakeLast');
  const email = get('intakeEmail');
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if (!first) return showIntakeErr('First name is required.');
  if (!last)  return showIntakeErr('Last name is required.');
  if (!emailOk) return showIntakeErr('Please enter a valid email.');
  if (!USER.gender) return showIntakeErr('Please choose how we should address you.');

// ─────────── Scene mounting
function renderCurrent() {
  let scene = SCENES[STATE.current];
  if (!scene) return;
  scene = applyConditional(scene);
  scene = personalizeScene(scene);
  const div = document.createElement('div');
  div.className = 'scene';
  switch (scene.type) {
    case 'landing':         div.innerHTML = renderLanding(scene); break;
    case 'intake':          div.innerHTML = renderIntake(scene); break;
    case 'crawl':           div.innerHTML = renderCrawl(scene); div.classList.add('crawl-scene'); break;
    case 'narrative':       div.innerHTML = renderNarrative(scene); break;
    case 'narrative-scene': div.innerHTML = renderNarrativeScene(scene); break;
    case 'question':        div.innerHTML = renderQuestion(scene, STATE.current); break;
    case 'midpoint':        div.innerHTML = renderMidpoint(scene); break;
    case 'twist':           div.innerHTML = renderTwist(scene); break;
    case 'end-reflection':  div.innerHTML = renderEndReflection(scene); break;
    case 'results-launch':  div.innerHTML = renderResultsLaunch(); break;
  }
  // Tag location
  if (scene.locationLabel) {
    locationTag.textContent = scene.locationLabel;
    locationTag.classList.add('visible');
  }
  if (STATE.current > 0) {
    frameMeta.classList.add('visible');
    progressRail.classList.add('visible');
  }
  // Mandarin brand mark, driven by the bl-stack visibility; logo top-right
  const logoTR = document.getElementById('logoTopRight');
  if (logoTR) logoTR.classList.add('visible');

  // Crawl scene takes over the screen, hide chrome for pure cinema
  if (scene.type === 'crawl') {
    frameMeta.classList.remove('visible');
    progressRail.classList.remove('visible');
    locationTag.classList.remove('visible');
    if (logoTR) logoTR.classList.remove('visible');
  }

  // Back button visibility
  const backBtn = document.getElementById('backButton');
  if (shouldShowBack(scene)) {
    backBtn.classList.add('visible');
    document.body.classList.add('has-back');
  } else {
    backBtn.classList.remove('visible');
    document.body.classList.remove('has-back');
  }

  // Update progress bar (count progress through assessment, not total scenes)
  const totalQ = SCENES.filter(s => s.type === 'question' || s.type === 'end-reflection').length;
  const doneQ = SCENES.slice(0, STATE.current + 1).filter(s => s.type === 'question' || s.type === 'end-reflection').length;
  progressFill.style.width = ((doneQ / totalQ) * 100) + '%';
  sceneCounter.textContent = (STATE.current + 1).toString().padStart(2, '0') + ' · ' + SCENES.length;

  // Swap current scene. Harden against rapid re-entry (rapid clicks, async
  // callbacks): if there's still a scene from a prior transition lingering in
  // the DOM (.scene without .active means it's mid-fade or already faded but
  // not yet removed), nuke it immediately so we never accumulate stacked
  // invisible scenes that could become visible again on a partial fade.
  Array.from(stage.querySelectorAll('.scene:not(.active)')).forEach(node => {
    if (node._removeTimer) { clearTimeout(node._removeTimer); }
    node.remove();
  });
  const existing = stage.querySelector('.scene.active');
  // Mark this scene as the "current" target IMMEDIATELY (before append) so all
  // question-handler queries (selectMC, selectScale, etc.) resolve against the
  // incoming scene rather than the outgoing one. Without this, clicks during
  // the 1.6s fade-in mutate the old scene's #qAdvance / .q-option elements
  // (returned first by document-wide queries), and the new scene visually
  // looks "inert", the option doesn't highlight, Continue stays disabled.
  Array.from(stage.querySelectorAll('.scene.current-scene')).forEach(n => n.classList.remove('current-scene'));
  div.classList.add('current-scene');
  // Also expose as STATE for handlers that want a direct reference.
  STATE.currentSceneEl = div;
  stage.appendChild(div);

  if (existing) {
    existing.classList.remove('active');
    existing._removeTimer = setTimeout(() => existing.remove(), 1800);
  }
  // Trigger reveal
  requestAnimationFrame(() => {
    requestAnimationFrame(() => div.classList.add('active'));
  });

  // Restore previous answer if revisiting a question
  if (scene.type === 'question' && STATE.answers[STATE.current] !== undefined) {
    const prev = STATE.answers[STATE.current];
    setTimeout(() => {
      if (scene.kind === 'rating' && typeof prev === 'number') {
        selectScale(prev);
      } else if (scene.kind === 'mc' && typeof prev === 'number') {
        selectMC(prev);
      } else if (scene.kind === 'ranking' && Array.isArray(prev)) {
        prev.forEach(idx => rankItem(idx));
      }
    }, 80);
  }

  // Auto-advance for non-interactive scenes, with visible countdown
  const autoTypes = ['narrative', 'narrative-scene', 'twist', 'crawl'];
  const timerRing = document.getElementById('timerRing');
  const timerProgress = document.getElementById('timerProgress');
  // Reset timer ring state
  clearTimeout(STATE.timer);
  timerRing.classList.remove('visible', 'running');
  timerProgress.style.animation = 'none';
  // Force reflow so animation can restart
  void timerProgress.offsetWidth;

  if (autoTypes.includes(scene.type) && scene.duration) {
    setTimeout(() => {
      timerRing.classList.add('visible', 'running');
      timerProgress.style.animation = `ring-fill ${scene.duration}ms linear forwards`;
    }, 600);
    // Crawl scene has its own end-of-scene whoosh, arm it ~2.4 s before next()
    if (scene.type === 'crawl') {
      STATE.crawlWhoosh = setTimeout(() => {
        const el = div.parentElement ? div : document.querySelector('.scene.crawl-scene.active');
        if (el) el.classList.add('whooshing');
      }, Math.max(0, scene.duration - 2400));
    }
    STATE.timer = setTimeout(() => {
      timerRing.classList.remove('visible', 'running');
      next();
    }, scene.duration);
  } else {
    timerRing.classList.remove('visible', 'running');
  }
}

function skipScene() {
  clearTimeout(STATE.timer);
  clearTimeout(STATE.crawlWhoosh);
  document.getElementById('timerRing').classList.remove('visible', 'running');
  // If skipping during crawl, still do a brief whoosh into Act 1
  const crawl = document.querySelector('.scene.crawl-scene.active');
  if (crawl && !crawl.classList.contains('whooshing')) {
    crawl.classList.add('whooshing');
    setTimeout(() => next(), 1600);
  } else {
    next();
  }
}

function next() {
  clearTimeout(STATE.timer);
  if (STATE.current < SCENES.length - 1) {
    STATE.current++;
    renderCurrent();
    window.scrollTo(0, 0);
  }
}

function back() {
  if (STATE.current > 0) {
    STATE.current--;
    renderCurrent();
  }
}

// Rebuild all scores from scratch by replaying STATE.answers, used when
// the user navigates back so previously-applied points don't double-count.
function rebuildScoresFromAnswers() {
  Object.keys(STATE.scores.practices).forEach(k => STATE.scores.practices[k] = []);
  Object.keys(STATE.scores.risks).forEach(k => STATE.scores.risks[k] = []);
  Object.entries(STATE.answers).forEach(([idxStr, value]) => {
    const idx = +idxStr;
    const scene = SCENES[idx];
    if (!scene || scene.type !== 'question') return;
    if (scene.kind === 'rating' && typeof value === 'number') {
      applyScore(scene.scoring[value]);
    } else if (scene.kind === 'mc' && typeof value === 'number') {
      applyScore(scene.options[value].score);
    } else if (scene.kind === 'ranking' && Array.isArray(value)) {
      value.forEach((itemIdx, pos) => {
        const item = scene.items[itemIdx];
        const w = scene.weights[pos] || 0;
        const weighted = {};
        Object.entries(item.score).forEach(([k, v]) => weighted[k] = v * w);
        applyScore(weighted);
      });
    }
  });
}

// Public "Back" handler used by the UI button, does not redo work; just
// steps back and rebuilds scores (since answers persist as the source of truth)
function goBack() {
  if (STATE.current === 0) return;
  STATE.current--;
  rebuildScoresFromAnswers();
  renderCurrent();
}

function shouldShowBack(scene) {
  // Hide on first scene, landing, intake, crawl, and the results launch
  if (STATE.current === 0) return false;
  if (!scene) return false;
  if (['landing','intake','crawl','results-launch'].includes(scene.type)) return false;
  return true;
}

// ─────────── INPUT HANDLERS
// Scope every question-handler DOM query to the incoming scene element. This
// is the fix for the "answer button is inert" bug, document-wide queries
// would return the outgoing (still-fading) scene's #qAdvance / .q-option when
// the user clicked an option during the 1.6s scene transition. See
// renderCurrent() for where `.current-scene` is applied (before fade-in).
function currentSceneScope() {
  return STATE.currentSceneEl || document.querySelector('.scene.current-scene') || document;
}

function selectScale(idx) {
  const scope = currentSceneScope();
  const items = scope.querySelectorAll('.q-scale-item');
  items.forEach(i => i.classList.remove('selected'));
  if (items[idx]) items[idx].classList.add('selected');
  STATE.pendingAnswer = idx;
  const adv = scope.querySelector('#qAdvance');
  if (adv) adv.classList.add('ready');
}

function selectMC(idx) {
  const scope = currentSceneScope();
  const items = scope.querySelectorAll('.q-option');
  items.forEach(i => i.classList.remove('selected'));
  if (items[idx]) items[idx].classList.add('selected');
  STATE.pendingAnswer = idx;
  const adv = scope.querySelector('#qAdvance');
  if (adv) adv.classList.add('ready');
}

function rankItem(idx) {
  STATE.ranking = STATE.ranking || [];
  if (STATE.ranking.includes(idx)) {
    STATE.ranking = STATE.ranking.filter(x => x !== idx);
  } else {
    STATE.ranking.push(idx);
  }
  // Update display
  const scope = currentSceneScope();
  const items = scope.querySelectorAll('.q-ranking-item');
  items.forEach((el, i) => {
    el.classList.remove('assigned');
    const rankEl = scope.querySelector(`#rank-${i}`);
    if (rankEl) { rankEl.classList.add('empty'); rankEl.textContent = '-'; }
  });
  STATE.ranking.forEach((sel, pos) => {
    const el = scope.querySelector(`.q-ranking-item[data-value="${sel}"]`);
    if (el) el.classList.add('assigned');
    const rankEl = scope.querySelector(`#rank-${sel}`);
    if (rankEl) { rankEl.classList.remove('empty'); rankEl.textContent = ['1st','2nd','3rd','4th'][pos] || (pos+1); }
  });
  const scene = SCENES[STATE.current];
  if (STATE.ranking.length === scene.items.length) {
    const adv = scope.querySelector('#qAdvance');
    if (adv) adv.classList.add('ready');
  }
}

function textChanged() {
  const scope = currentSceneScope();
  const input = scope.querySelector('#qInput');
  if (!input) return;
  const val = input.value.trim();
  const adv = scope.querySelector('#qAdvance');
  if (!adv) return;
  if (val.length >= 3) adv.classList.add('ready');
  else adv.classList.remove('ready');
}

function submitAnswer() {
  const scene = SCENES[STATE.current];
  if (scene.kind === 'rating' && STATE.pendingAnswer !== undefined) {
    STATE.answers[STATE.current] = STATE.pendingAnswer;
    STATE.pendingAnswer = undefined;
    rebuildScoresFromAnswers();
    next();
  } else if (scene.kind === 'mc' && STATE.pendingAnswer !== undefined) {
    STATE.answers[STATE.current] = STATE.pendingAnswer;
    STATE.pendingAnswer = undefined;
    rebuildScoresFromAnswers();
    next();
  } else if (scene.kind === 'ranking' && STATE.ranking && STATE.ranking.length === scene.items.length) {
    STATE.answers[STATE.current] = STATE.ranking.slice();
    STATE.ranking = [];
    rebuildScoresFromAnswers();
    next();
  } else if (scene.kind === 'short-text') {
    const input = currentSceneScope().querySelector('#qInput');
    STATE.reflections['midtext_' + STATE.current] = input ? input.value.trim() : '';
    next();
  }
}

function submitReflection(key) {
  const input = currentSceneScope().querySelector('#qInput');
  const val = input ? input.value.trim() : '';
  STATE.reflections[key] = val;
  next();
}

const IMAGE_AVAILABLE = {};
function probeImage(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload  = () => { IMAGE_AVAILABLE[url] = true;  resolve(true); };
    img.onerror = () => { IMAGE_AVAILABLE[url] = false; resolve(false); };
    img.src = url + '?v=1';
  });
}
function probeAllImages() {
  // Probe every archetype × every gender (for the current skin), plus all scene images.
  const genders = ['she','he','they'];
  const dir = (IMAGE_MAP.archetypeDir || 'images/').replace(/\/?$/, '/');
  const archUrls = [];
  Object.keys(IMAGE_MAP.archetype).forEach(k => {
    genders.forEach(g => archUrls.push(`${dir}archetype-${k.replace(/_/g,'-')}-${g}.png`));
  });
  const urls = [...archUrls, ...Object.values(IMAGE_MAP.scene).filter(Boolean)];
  return Promise.all(urls.map(probeImage));
}
function imageSlot(svgFallback, imageUrl, altText) {
  if (IMAGE_AVAILABLE[imageUrl]) {
    return `<img src="${imageUrl}" alt="${altText}" style="width:100%;height:100%;object-fit:cover;display:block"/>`;
  }
  return svgFallback;
}

// Two CDN libs lazy-loaded the first time the user requests a PDF:
//   * html2canvas, renders a DOM subtree to a <canvas>
//   * jsPDF, places the canvas image on a PDF page
// We build a self-contained "print" version of the results, render each
// page node off-screen, then assemble the PDF and trigger a download.
const PDF_LIB_URLS = {
  jspdf:       'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
  html2canvas: 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'
};
let _pdfLibsPromise = null;
function loadPdfLibs() {
  if (window.jspdf && window.html2canvas) return Promise.resolve();
  if (_pdfLibsPromise) return _pdfLibsPromise;
  function loadScript(src) {
    return new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src; s.async = true;
      s.onload = () => res();
      s.onerror = () => rej(new Error('Failed to load ' + src));
      document.head.appendChild(s);
    });
  }
  _pdfLibsPromise = Promise.all([loadScript(PDF_LIB_URLS.jspdf), loadScript(PDF_LIB_URLS.html2canvas)]);
  return _pdfLibsPromise;
}

// Map a session to a stable PDF filename.
function pdfFilenameForSession(session) {
  const safe = s => String(s || '').replace(/[^a-z0-9-]+/gi, '-').toLowerCase().replace(/^-+|-+$/g, '');
  const date = (session.completed_at || new Date().toISOString()).slice(0, 10);
  return `mandarin-${safe(session.firstName) || 'result'}-${safe(session.lastName) || ''}-${date}.pdf`.replace(/--+/g,'-');
}

// Resolve the archetype + secondary pattern + skin info for a session, with
// graceful fallback when the session was taken on a skin no longer loaded.
function resolveSessionRefs(session) {
  const archKey = session.archetype;
  const arch = (ARCHETYPES && ARCHETYPES[archKey]) || { name: session.archetype_name || archKey, band: '-', body: '', risk: '', focus: '', next: '' };
  const secKey = session.secondary_pattern;
  const sec = secKey && SECONDARY_PATTERNS && SECONDARY_PATTERNS[secKey] ? SECONDARY_PATTERNS[secKey] : null;
  return { archKey, arch, secKey, sec };
}

// Render a horizontal score bar as plain HTML (html2canvas safe).
function pdfScoreBar(score, max, color, label, rightText) {
  const pct = Math.max(0, Math.min(100, Math.round((score / max) * 100)));
  return `
    <div style="display:block;margin-bottom:10px;font-family:Inter,Helvetica,Arial,sans-serif">
      <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:500;color:#0a0a0a;letter-spacing:0.04em;margin-bottom:4px">
        <span style="text-transform:uppercase">${escapeHTML(label)}</span>
        <span style="color:${color};font-weight:700">${escapeHTML(rightText || (score + ''))}</span>
      </div>
      <div style="background:#e7e2d6;height:7px;border-radius:0">
        <div style="background:${color};height:100%;width:${pct}%"></div>
      </div>
    </div>`;
}

}

      ${pageFooter(7, totalPages)}
    </div>`;

  return `<div id="pdfRoot"><style>${pageCSS}</style>${page1}${page2}${page3}${page4}${page5}${page6}${page7}</div>`;
}

// Build the jsPDF document for a session and return it. Shared by the
// download path (which calls .save()) and the auto-email path (which
// extracts the base64 bytes for upload).
async function _buildSessionPDF(session) {
  await loadPdfLibs();
  const html = buildResultsPrintHTML(session);
  const host = document.createElement('div');
  host.style.cssText = 'position:absolute;left:-99999px;top:0;opacity:0;pointer-events:none;background:#fff';
  host.innerHTML = html;
  document.body.appendChild(host);
  try {
    const pages = host.querySelectorAll('.pdf-page');
    const jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
    if (!jsPDFCtor || !window.html2canvas) throw new Error('PDF libs missing');
    const pdf = new jsPDFCtor({ orientation: 'portrait', unit: 'px', format: [794, 1123], hotfixes: ['px_scaling'] });
    for (let i = 0; i < pages.length; i++) {
      const canvas = await window.html2canvas(pages[i], { scale: 2, backgroundColor: '#f4f0e8', useCORS: true });
      const imgData = canvas.toDataURL('image/png');
      if (i > 0) pdf.addPage([794, 1123], 'portrait');
      pdf.addImage(imgData, 'PNG', 0, 0, 794, 1123, undefined, 'FAST');
    }
    return pdf;
  } finally {
    document.body.removeChild(host);
  }
}

async function downloadResultsPDF(session) {
  try {
    const pdf = await _buildSessionPDF(session);
    pdf.save(pdfFilenameForSession(session));
  } catch (e) {
    console.error('PDF render failed:', e);
    alert('PDF generation failed: ' + (e && e.message ? e.message : e));
  }
}

// Returns the PDF as a base64 string (no data URI prefix), for upload to
// the email function. Failure returns null and the email is sent without
// the attachment, the user still gets HTML + magic link.
async function getResultsPDFBase64(session) {
  try {
    const pdf = await _buildSessionPDF(session);
    const dataUri = pdf.output('datauristring');
    const comma = dataUri.indexOf(',');
    return comma > -1 ? dataUri.slice(comma + 1) : dataUri;
  } catch (e) {
    console.warn('PDF base64 generation failed:', e);
    return null;
  }
}

// Fire-and-forget email send after results show. Failure is silent, the
// user keeps using the page; we surface no error UI on purpose.
function autoEmailResult(session) {
  if (!session || !session.email) return;
  // Generate the PDF in the background, then POST.
  getResultsPDFBase64(session).then(pdfBase64 => {
    return fetch('/api/email/result', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ session, pdfBase64: pdfBase64 || '' })
    });
  }).then(r => {
    if (!r || !r.ok) console.warn('autoEmailResult: server returned', r && r.status);
  }).catch(e => {
    console.warn('autoEmailResult failed:', e);
  });
}

function showResults(isPreview) {
  // Hide stage
  stage.style.display = 'none';

  locationTag.classList.remove('visible');
  progressRail.classList.remove('visible');
  frameMeta.classList.remove('visible');

  document.getElementById('backButton').classList.remove('visible');
  document.body.classList.remove('interactive');

  // Resolve R + archetype, admin preview overrides
  let R, archKey, isAdminPreview = false;
  if (STATE.adminForceArchetype) {
    R = STATE.adminMockR;
    archKey = STATE.adminForceArchetype;
    isAdminPreview = true;
  } else {
    R = computeResults();
    archKey = pickArchetype(R);
    saveSessionToHistory(R, archKey, pickSecondaryPattern(R));
    hidePreviewBanner();
  }
  const arch = ARCHETYPES[archKey];
  const secondaryKey = STATE.adminForceSecondary || pickSecondaryPattern(R);
  const secondary = secondaryKey ? SECONDARY_PATTERNS[secondaryKey] : null;
  // Did a hard threshold trigger this pattern, or is the user merely tilting toward it?
  const secondaryHardTriggered = secondary && typeof secondary.trigger === 'function' && (function() {
    try { return !!secondary.trigger(R); } catch (e) { return false; }
  })();
  if (isAdminPreview) {
    const label = secondary ? `${arch.name}  ·  + ${secondary.name}` : arch.name;
    showPreviewBanner(label);
  }

  // Find top + bottom practices
  const sortedP = Object.entries(R.practices).sort((a,b) => b[1] - a[1]);
  const top = sortedP[0];
  const bottom = sortedP[sortedP.length - 1];

  // ─── Stash data on window for interactive wheel + PDF download ───
  window.__R = R;
  window.__arch = arch;
  window.__archKey = archKey;
  window.__secondaryKey = secondaryKey;

  // ─── Build the interactive wheel SVG ───
  // 12 practices arranged clockwise from 12 o'clock; 4 quadrants by level
  const practiceOrder = [
    'understand_self', 'master_emotions', 'embed_practices',
    'be_curious', 'listen_deeply', 'think_critically',
    'unlock_creativity', 'manage_uncertainty', 'future_focused',
    'act_decisively', 'collaborate_inclusively', 'influence_effortlessly'
  ];
  const cx = 400, cy = 400, innerR = 110, baseR = 180, maxR = 360;
  const segAngle = 30 * Math.PI / 180;

  function pointAt(r, angleRad) {
    return [cx + r * Math.cos(angleRad), cy + r * Math.sin(angleRad)];
  }

  function arcSegment(r0, r1, a0, a1, largeArc=0) {
    const [x0, y0] = pointAt(r0, a0);
    const [x1, y1] = pointAt(r0, a1);
    const [x2, y2] = pointAt(r1, a1);
    const [x3, y3] = pointAt(r1, a0);
    return `M ${x0} ${y0} A ${r0} ${r0} 0 ${largeArc} 1 ${x1} ${y1} L ${x2} ${y2} A ${r1} ${r1} 0 ${largeArc} 0 ${x3} ${y3} Z`;
  }

  function arcPath(r, a0, a1, sweep=1) {
    const [x0, y0] = pointAt(r, a0);
    const [x1, y1] = pointAt(r, a1);
    return `M ${x0} ${y0} A ${r} ${r} 0 0 ${sweep} ${x1} ${y1}`;
  }

  const segmentsSVG = practiceOrder.map((key, i) => {
    const score = R.practices[key];
    // Start at -90° (12 o'clock), advance clockwise
    const a0 = -Math.PI/2 + i * segAngle;
    const a1 = a0 + segAngle;
    const scoreR = baseR + (score / 100) * (maxR - baseR);
    const path = arcSegment(innerR, scoreR, a0, a1);
    // Fill opacity by score (heatmap-like)
    const fillOpacity = 0.18 + (score/100) * 0.55;
    return `<path class="wheel-segment" data-key="${key}" data-score="${score}"
              d="${path}"
              fill="rgba(255, 90, 44,${fillOpacity.toFixed(3)})"
              stroke="rgba(255, 90, 44,0.55)" stroke-width="0.7"
              onclick="selectWheelSegment('${key}')"
              onmouseover="hoverWheelSegment('${key}')"></path>`;
  }).join('');

  // Reference rings at 25/50/75/100
  const referenceRings = [25, 50, 75, 100].map(pct => {
    const r = baseR + (pct/100) * (maxR - baseR);
    return `<circle class="wheel-ring" cx="${cx}" cy="${cy}" r="${r}"/>`;
  }).join('');

  // Spokes between segments
  const spokes = practiceOrder.map((_, i) => {
    const a = -Math.PI/2 + i * segAngle;
    const [x1, y1] = pointAt(innerR, a);
    const [x2, y2] = pointAt(maxR, a);
    return `<line class="wheel-spoke" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
  }).join('');

  // Quadrant level labels, placed on outer arc center per quadrant
  const levelArcs = [
    { L: 'L1', startIdx: 0 },
    { L: 'L2', startIdx: 3 },
    { L: 'L3', startIdx: 6 },
    { L: 'L4', startIdx: 9 }

    // 3 segments per quadrant; center on segment 1 + 0.5
    const a0 = -Math.PI/2 + startIdx * segAngle;

    const r = maxR + 26;
    // For top half use sweep=1, bottom half flip
    const isBottom = (a0 + a1)/2 > Math.PI/2 - Math.PI/2 + Math.PI/2;
    // Simpler: just place horizontal label at midpoint
    const midA = (a0 + a1)/2;
    const [tx, ty] = pointAt(r, midA);
    const rot = (midA * 180/Math.PI + 90);
    const rotFinal = (rot > 90 && rot < 270) ? rot + 180 : rot;
    return `<text class="wheel-level-arc" x="${tx}" y="${ty}" text-anchor="middle"
              dominant-baseline="middle"

  // Tiny practice icon glyphs at the inner-edge of each segment
  const segIcons = practiceOrder.map((key, i) => {
    const midA = -Math.PI/2 + i * segAngle + segAngle/2;
    const r = innerR + 28;
    const [ix, iy] = pointAt(r, midA);
    const icon = PRACTICE_ICONS[key];
    // Insert as inline group with translate + rotate to face out
    const rot = midA * 180 / Math.PI + 90;
    return `<g class="wheel-icon" data-key="${key}" transform="translate(${ix-10} ${iy-10})" pointer-events="none">
      <g transform="scale(0.85)">

  const wheelSVG = `

// Particles (subtle floating dust)
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const particles = Array.from({length: 60}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  vx: (Math.random() - 0.5) * 0.15,
  vy: (Math.random() - 0.5) * 0.12,
  r: Math.random() * 1.2 + 0.3,
  a: Math.random() * 0.5 + 0.1
}));

function animateParticles() {
  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = window.innerWidth;
    if (p.x > window.innerWidth) p.x = 0;
    if (p.y < 0) p.y = window.innerHeight;
    if (p.y > window.innerHeight) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 90, 44, ${p.a * 0.4})`;
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// Magic-link viewer: when STATE was set via renderSessionResults with a
// returnTo URL, swap the preview banner controls so "Back" goes to the
// user's /me page rather than the admin overlay.
function configurePreviewBannerForReturnTo() {
  // ret values:
  //   null / undefined  → preview launched without a viewer wrapper (legacy admin path)
  //   'admin'           → admin clicked "View" on a stored session
  //   any URL string    → magic-link / /me viewer; that URL is where "Back" goes
  const ret = window.__sessionViewerReturnTo;
  const banner = document.getElementById('previewBanner');
  if (!banner) return;
  const isUserViewer = !!ret && ret !== 'admin';
  const isAdminViewer = ret === 'admin';
  const label2 = banner.querySelector('span:nth-of-type(2)');
  const buttons = banner.querySelectorAll('.exit-link');
  if (isUserViewer) {
    if (label2) label2.textContent = 'VIEWING SAVED RESULT';
    if (buttons[0]) { buttons[0].textContent = 'Back to my results'; buttons[0].onclick = function() { window.location.href = ret; }; }
    if (buttons[1]) buttons[1].style.display = 'none';
  } else if (isAdminViewer) {
    if (label2) label2.textContent = 'VIEWING SAVED RESULT';
    if (buttons[0]) { buttons[0].textContent = 'Back to admin'; buttons[0].onclick = exitPreview; }
    if (buttons[1]) buttons[1].style.display = 'none';
  } else {
    if (label2) label2.textContent = 'PREVIEW · admin override';
    if (buttons[0]) { buttons[0].textContent = 'Back to admin'; buttons[0].onclick = exitPreview; }
    if (buttons[1]) { buttons[1].style.display = ''; }
  }
}

function showPreviewBanner(label) {
  configurePreviewBannerForReturnTo();
  const b = document.getElementById('previewBanner');
  if (!b) return;
  document.getElementById('previewName').textContent = label;
  b.classList.add('visible');
  document.body.classList.add('previewing');

function switchAdminTab(tab) {

  if (tab === 'archetypes') body.innerHTML = renderAdminArchetypes();

  else if (tab === 'scoring') body.innerHTML = renderAdminScoring();
  else if (tab === 'pacing')  body.innerHTML = renderAdminPacing();
  else if (tab === 'rules')   body.innerHTML = renderAdminRules();
  else if (tab === 'results') {

}

// Render the full cinematic results page from a stored session object.
// Used by:
//   - admin "View" buttons (local + cloud) to inspect what a user saw
//   - /me view-results deep link (?view-session=<id>&token=<token>) so a
//     user can return to their own completed results page
// Sets the admin-force state so showResults() reads our injected R + arch
// rather than recomputing from the (empty) answers; switches the active
// skin to the one the session was taken on so all copy + theming match.
function renderSessionResults(session, opts) {
  opts = opts || {};
  if (!session || !session.archetype) {
    alert('Session is missing the data needed to render results.');
    return;
  }
  // Switch to the session's original skin so copy / theme / NEXT_STEPS line up.
  if (session.skin && SKINS && SKINS[session.skin] && STATE.currentSkin !== session.skin) {
    try { applySkin(session.skin, { skipRender: true }); } catch (e) {}
  }
  // Build the results structure showResults expects.
  const R = {
    practices: Object.assign({}, session.practices || {}),
    levels:    Object.assign({}, session.levels || {}),
    risks:     Object.assign({}, session.risks || {}),
    overall:   session.overall != null ? session.overall : 0
  };
  STATE.adminForceArchetype = session.archetype;
  STATE.adminForceSecondary = session.secondary_pattern || null;
  STATE.adminMockR = R;
  // Populate USER for personalisation tokens in the rendered prose.
  USER.firstName = session.firstName || USER.firstName || 'You';
  USER.lastName  = session.lastName  || USER.lastName  || '';
  USER.email     = session.email     || USER.email     || '';
  USER.gender    = session.gender    || USER.gender    || 'they';
  // Restore reflections so the "Your reflections" section shows the user's own words.
  STATE.reflections = Object.assign({}, session.reflections || {});
  // We're being launched from admin (admin-open) or from a magic-link page
  // bootstrap (admin-mode but not admin-open). Either way, hide the chrome.
  // session-viewer specifically tells the CSS to keep #resultsStage visible
  // despite the admin-mode hide rule (which exists for the flash-prevention
  // path, where #resultsStage SHOULD be hidden).
  document.documentElement.classList.add('admin-mode');
  document.documentElement.classList.add('session-viewer');
  closeAdmin({ stay: true });
  document.getElementById('stage').style.display = 'none';
  // Note: opts.label and opts.returnTo become the preview-banner text +
  // back link, set on window so the banner can find them later.
  window.__sessionViewerReturnTo = opts.returnTo || null;
  window.__sessionViewerLabel = opts.label || null;
  showResults(true);
}

// Build an editable string registry from SCENES + ARCHETYPES + framework copy
function buildContentRegistry() {
  const reg = []; // { group, key, label, value }
  // Scenes
  SCENES.forEach((s, idx) => {
    const tag = `scene_${idx} · ${s.type}${s.locationLabel ? ' · ' + s.locationLabel : ''}`;
    const push = (label, key, value) => { if (typeof value === 'string') reg.push({ group: 'Story', tag, label, key, value }); };
    if (typeof s.title === 'string')  push('title', `scenes.${idx}.title`, s.title);
    push('sub', `scenes.${idx}.sub`, s.sub);
    push('note', `scenes.${idx}.note`, s.note);
    push('cta', `scenes.${idx}.cta`, s.cta);
    push('eyebrow', `scenes.${idx}.eyebrow`, s.eyebrow);
    push('setup', `scenes.${idx}.setup`, s.setup);
    push('prompt', `scenes.${idx}.prompt`, s.prompt);
    push('placeholder', `scenes.${idx}.placeholder`, s.placeholder);
    push('hint', `scenes.${idx}.hint`, s.hint);
    push('quote', `scenes.${idx}.quote`, s.quote);
    push('speaker', `scenes.${idx}.speaker`, s.speaker);
    push('closing', `scenes.${idx}.closing`, s.closing);
    push('intro', `scenes.${idx}.intro`, s.intro);
    if (Array.isArray(s.body)) s.body.forEach((w, j) => push(`body[${j}]`, `scenes.${idx}.body.${j}`, w));
    if (Array.isArray(s.bodyAfter)) s.bodyAfter.forEach((line, j) => push(`bodyAfter[${j}]`, `scenes.${idx}.bodyAfter.${j}`, line));
    if (Array.isArray(s.labels)) s.labels.forEach((l, j) => push(`labels[${j}]`, `scenes.${idx}.labels.${j}`, l));
    if (Array.isArray(s.options)) s.options.forEach((opt, j) => push(`options[${j}].copy`, `scenes.${idx}.options.${j}.copy`, opt.copy));
    if (Array.isArray(s.items)) s.items.forEach((it, j) => push(`items[${j}].label`, `scenes.${idx}.items.${j}.label`, it.label));
  });
  // Archetypes
  Object.entries(ARCHETYPES).forEach(([key, a]) => {
    ['name','band','headline','body','risk','focus','next'].forEach(field => {
      if (typeof a[field] === 'string') reg.push({ group: 'Archetypes', tag: a.name, label: field, key: `archetypes.${key}.${field}`, value: a[field] });
    });
  });
  // Secondary patterns
  Object.entries(SECONDARY_PATTERNS).forEach(([key, p]) => {
    ['name','headline','body'].forEach(field => {
      if (typeof p[field] === 'string') reg.push({ group: 'Secondary patterns', tag: p.name, label: field, key: `secondary.${key}.${field}`, value: p[field] });
    });
  });
  // Risk copy
  Object.entries(RISK_COPY).forEach(([key, r]) => {
    ['name','low','mod','high','q'].forEach(field => {
      if (typeof r[field] === 'string') reg.push({ group: 'Risk overlays', tag: r.name, label: field, key: `risks.${key}.${field}`, value: r[field] });
    });
  });
  // Next steps
  Object.entries(NEXT_STEPS).forEach(([archKey, steps]) => {
    steps.forEach((s, j) => {
      ['title','body','test'].forEach(field => {
        if (typeof s[field] === 'string') reg.push({ group: `Next steps · ${ARCHETYPES[archKey]?.name || archKey}`, tag: s.title, label: field, key: `nextSteps.${archKey}.${j}.${field}`, value: s[field] });
      });
    });
  });
  return reg;
}

function adminEditSkin(skinId) {

function filterContent(q) {

function markEdited(el) {
  el.classList.add('edited');
}

function loadEdits() {
  try { return JSON.parse(localStorage.getItem(ADMIN_LS_EDITS) || '{}'); }
  catch (e) { return {}; }
}

function persistEdits(obj) {
  try { localStorage.setItem(ADMIN_LS_EDITS, JSON.stringify(obj)); } catch (e) {}
}

function saveEdit(key, btn) {
  const ta = document.querySelector(`textarea[data-key="${key}"]`);
  if (!ta) return;
  const edits = loadEdits();
  edits[key] = ta.value;
  persistEdits(edits);
  applyEditsToData();
  ta.classList.remove('edited');
  btn.textContent = 'Saved';
  setTimeout(() => btn.textContent = 'Save', 1100);
}

function resetEdit(key) {
  const edits = loadEdits();
  delete edits[key];
  persistEdits(edits);
  applyEditsToData();
  switchAdminTab('content');
}

function exportEdits() {
  const edits = loadEdits();
  const blob = new Blob([JSON.stringify(edits, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'assessment-edits.json'; a.click();
  URL.revokeObjectURL(url);
}

function importEdits(evt) {
  const file = evt.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const imported = JSON.parse(r.result);
      persistEdits(imported);
      applyEditsToData();
      switchAdminTab('content');
    } catch (e) { alert('Could not parse JSON: ' + e.message); }
  };
  r.readAsText(file);
}

function clearAllEdits() {
  if (!confirm('Reset every content override?')) return;
  persistEdits({});
  // Re-apply original, easiest is full page reload
  window.location.reload();
}

// Walk a dot.path and set/get value on the data tree
function getByPath(root, path) {
  return path.split('.').reduce((o, k) => (o == null ? o : o[k]), root);
}
function setByPath(root, path, value) {
  const parts = path.split('.');
  const last = parts.pop();
  const parent = parts.reduce((o, k) => o[k], root);
  if (parent) parent[last] = value;
}

const DATA_ROOTS = { scenes: SCENES, archetypes: ARCHETYPES, secondary: SECONDARY_PATTERNS, risks: RISK_COPY, nextSteps: NEXT_STEPS };

// Detect "this path holds a numeric scoring value" and coerce to number.
function isNumericEditPath(key) {
  return /\.scoring\.\d+\.|\.options\.\d+\.score\.|\.items\.\d+\.score\.|\.weights\.\d+$|^rules\./.test(key);
}

function applyEditsToData() {
  const edits = loadEdits();
  Object.entries(edits).forEach(([key, value]) => {
    const [root, ...rest] = key.split('.');
    // The 'rules' edits target THRESHOLDS, not a data root, handled separately
    if (root === 'rules') return;
    const r = DATA_ROOTS[root];
    if (!r) return;
    const v = isNumericEditPath(key) ? Number(value) : value;
    setByPath(r, rest.join('.'), v);
  });
}

function saveSessionToHistory(R, archKey, secondaryKey) {
  if (!USER.firstName && !USER.email) return; // Don't store empty/preview sessions
